<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hymn Manager - Mosaic Church</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400..700;1,400..700&amp;family=Work+Sans:wght@400..700&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="manager.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-functions-compat.js"></script>
    
    <script src="auth.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary": "#001a43",
                      "surface-container-lowest": "#ffffff",
                      "primary-container": "#1a3059",
                      "on-background": "#1c1c18",
                      "on-secondary-container": "#415e7f",
                      "surface-container-highest": "#e5e2dc",
                      "on-secondary": "#ffffff",
                      "surface-tint": "#4a5e8a",
                      "inverse-surface": "#31312d",
                      "outline-variant": "#c5c6d0",
                      "outline": "#75777f",
                      "surface": "#fcf9f3",
                      "surface-container-low": "#f6f3ed",
                      "tertiary-fixed-dim": "#95cfe4",
                      "on-primary-fixed-variant": "#314670",
                      "on-primary-fixed": "#001a42",
                      "background": "#fcf9f3",
                      "tertiary-container": "#003643",
                      "secondary": "#436082",
                      "secondary-container": "#b9d7fe",
                      "surface-bright": "#fcf9f3",
                      "tertiary-fixed": "#b5ebff",
                      "on-primary-container": "#8499c8",
                      "secondary-fixed-dim": "#abc9ef",
                      "error-container": "#ffdad6",
                      "on-tertiary-fixed-variant": "#004e60",
                      "inverse-primary": "#b2c6f8",
                      "on-surface-variant": "#44474e",
                      "on-tertiary-container": "#67a1b5",
                      "secondary-fixed": "#d1e4ff",
                      "inverse-on-surface": "#f3f0ea",
                      "tertiary": "#001f28",
                      "surface-container": "#f0eee8",
                      "on-surface": "#1c1c18",
                      "on-secondary-fixed": "#001d36",
                      "surface-container-high": "#ebe8e2",
                      "on-tertiary": "#ffffff",
                      "on-secondary-fixed-variant": "#2b4969",
                      "surface-dim": "#dcdad4",
                      "primary-fixed-dim": "#b2c6f8",
                      "on-tertiary-fixed": "#001f28",
                      "primary-fixed": "#d8e2ff",
                      "surface-variant": "#e5e2dc",
                      "error": "#ba1a1a",
                      "on-primary": "#ffffff",
                      "on-error": "#ffffff",
                      "on-error-container": "#93000a"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "gutter": "24px",
                      "margin": "32px",
                      "xs": "4px",
                      "md": "24px",
                      "lg": "48px",
                      "base": "8px",
                      "xl": "80px",
                      "sm": "12px"
              },
              "fontFamily": {
                      "headline-md": ["Noto Serif"],
                      "headline-lg": ["Noto Serif"],
                      "body-md": ["Work Sans"],
                      "body-lg": ["Work Sans"],
                      "label-md": ["Work Sans"],
                      "display-lg": ["Noto Serif"]
              },
              "fontSize": {
                      "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                      "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "600"}],
                      "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                      "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                      "label-md": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600"}],
                      "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}]
              }
            }
          }
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md antialiased h-screen flex flex-col relative overflow-hidden">
    <!-- Architectural accent lines (Modern Minimalism) -->
    <div class="absolute right-0 top-0 h-96 w-1/3 bg-gradient-to-l from-surface-container-high to-transparent opacity-30 pointer-events-none"></div>
    
    <header class="w-full flex-shrink-0 flex justify-between items-center px-6 py-4 max-w-full mx-auto border-b border-surface-variant/30 relative z-10 bg-surface">
        <div class="flex-1">
            <a href="index.html" class="font-label-md text-label-md text-secondary hover:text-primary transition-colors flex items-center gap-2 uppercase tracking-widest text-[11px]">
                <span class="material-symbols-outlined text-sm">arrow_back</span>
                <span class="hidden md:inline">Back to Dashboard</span>
                <span class="md:hidden">Back</span>
            </a>
        </div>
        <div class="flex-1 flex justify-center items-center">
            <div class="flex flex-col items-center gap-1">
                <img alt="Mosaic Church Logo" class="h-10 w-10 object-contain" src="assets/mosaic-logo.png"/>
                <div class="flex gap-4 mt-1">
                    <a href="manager.html" class="font-label-md text-[10px] text-primary font-bold uppercase tracking-widest border-b-2 border-primary">Hymns</a>
                    <a href="peoples-page.html" class="font-label-md text-[10px] text-secondary hover:text-primary transition-colors uppercase tracking-widest">Directory</a>
                </div>
            </div>
        </div>
        <div class="flex-1 flex justify-end items-center" id="auth-container"></div>
    </header>
    
    <main class="flex-1 flex flex-col w-full max-w-[1000px] mx-auto relative z-10 overflow-hidden" x-data="hymnManager()">
        <!-- Sticky Action Bar -->
        <div class="px-gutter py-md border-b border-surface-variant/10 bg-background/80 backdrop-blur-md flex-shrink-0 flex justify-between items-center z-20">
            <h1 class="font-headline-md text-2xl text-primary tracking-tight">Hymn Catalog</h1>
            <button @click="startCreateHymn()" class="bg-primary text-on-primary px-6 py-2.5 rounded-full font-label-md text-xs hover:bg-opacity-90 transition-all flex items-center gap-2 shadow-sm active:scale-95">
                <span class="material-symbols-outlined text-[18px]">add</span>
                <span>Add New Hymn</span>
            </button>
        </div>

        <!-- Scrollable List Area -->
        <div class="flex-1 overflow-y-auto px-gutter py-md scrollbar-thin">
            <div class="bg-surface-container-lowest border border-outline-variant/30 rounded-xl shadow-sm overflow-hidden">
                <div class="p-md border-b border-surface-variant/30 flex justify-between items-center bg-surface-container-low/50">
                    <span class="font-label-md text-xs text-on-surface-variant uppercase tracking-widest" x-text="hymns.length + ' Total Hymns'"></span>
                </div>
                
                <div id="hymn-list" class="p-xs space-y-1" @click.away="selectedHymnId = null">
                    <template x-for="hymn in hymns" :key="hymn.id">
                        <div class="group flex justify-between items-center p-md rounded-lg transition-all border cursor-pointer"
                             :class="selectedHymnId === hymn.id ? 'bg-secondary/10 border-secondary/30 ring-1 ring-secondary/20 shadow-sm' : 'hover:bg-surface-container-low border-transparent hover:border-outline-variant/20'"
                             @click="selectedHymnId = (selectedHymnId === hymn.id ? null : hymn.id)">
                            <div class="flex flex-col gap-0.5">
                                <strong class="font-body-lg text-on-surface transition-colors" 
                                        :class="selectedHymnId === hymn.id ? 'text-primary font-bold' : ''"
                                        x-text="hymn.hymn_name"></strong>
                                <span class="font-label-md text-[10px] text-on-surface-variant uppercase tracking-wider" x-text="hymn.music_writer"></span>
                            </div>
                            <div class="flex gap-2 transition-all duration-200" 
                                 :class="selectedHymnId === hymn.id ? 'opacity-100 translate-x-0' : 'opacity-0 translate-x-4 pointer-events-none'">
                                <button type="button" class="p-2 text-secondary hover:text-primary hover:bg-surface-container rounded-full transition-all" @click.stop="startEditHymn(hymn)" title="Edit">
                                    <span class="material-symbols-outlined text-sm">edit</span>
                                </button>
                                <button type="button" class="p-2 text-error/60 hover:text-error hover:bg-error-container/30 rounded-full transition-all" @click.stop="deleteHymn(hymn)" title="Delete">
                                    <span class="material-symbols-outlined text-sm">delete</span>
                                </button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <!-- Modal Overlay -->
        <div x-show="showFormModal" 
             x-cloak
             class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-primary/20 backdrop-blur-sm"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0">
            
            <div class="bg-surface-container-lowest border border-outline-variant/30 rounded-2xl shadow-2xl max-w-4xl w-full max-h-[90vh] flex flex-col overflow-hidden relative"
                 @click.away="!isSubmitting && resetForm()">
                
                <div class="flex items-center justify-between p-md border-b border-outline-variant/20 bg-surface-container-low/50">
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined text-primary" x-text="isEditing ? 'edit_note' : 'add_circle'"></span>
                        <h2 class="font-headline-md text-xl text-primary tracking-tight" x-text="isEditing ? 'Edit Hymn Details' : 'Register New Hymn'"></h2>
                    </div>
                    <button @click="resetForm()" class="text-on-surface-variant hover:text-error transition-colors" :disabled="isSubmitting">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>

                <div class="flex-1 overflow-y-auto p-lg scrollbar-thin">
                    <form id="add-hymn-form" @submit.prevent="handleSubmit" class="space-y-md">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-md">
                            <div class="flex flex-col gap-xs">
                                <label class="font-label-md text-[11px] uppercase tracking-widest text-on-surface-variant">Hymn Name</label>
                                <input type="text" x-model="formData.hymn_name" placeholder="Title of the hymn" required class="w-full py-2.5 px-4 bg-surface-container-low border border-outline-variant/50 rounded-lg focus:ring-1 focus:ring-tertiary-container transition-all outline-none font-body-md">
                            </div>
                            <div class="flex flex-col gap-xs">
                                <label class="font-label-md text-[11px] uppercase tracking-widest text-on-surface-variant">Music Writer</label>
                                <input type="text" x-model="formData.music_writer" placeholder="Composer" required class="w-full py-2.5 px-4 bg-surface-container-low border border-outline-variant/50 rounded-lg focus:ring-1 focus:ring-tertiary-container transition-all outline-none font-body-md">
                            </div>
                            <div class="flex flex-col gap-xs">
                                <label class="font-label-md text-[11px] uppercase tracking-widest text-on-surface-variant">Lyrics Writer</label>
                                <input type="text" x-model="formData.lyrics_writer" placeholder="Author/Lyricist" required class="w-full py-2.5 px-4 bg-surface-container-low border border-outline-variant/50 rounded-lg focus:ring-1 focus:ring-tertiary-container transition-all outline-none font-body-md">
                            </div>
                            <div class="flex flex-col gap-xs">
                                <label class="font-label-md text-[11px] uppercase tracking-widest text-on-surface-variant">Attribution</label>
                                <input type="text" x-model="formData.attribution" placeholder="e.g. Public Domain" required class="w-full py-2.5 px-4 bg-surface-container-low border border-outline-variant/50 rounded-lg focus:ring-1 focus:ring-tertiary-container transition-all outline-none font-body-md">
                            </div>
                        </div>
                        
                        <div class="flex flex-col gap-xs">
                            <label class="font-label-md text-[11px] uppercase tracking-widest text-on-surface-variant">Theological Tags</label>
                            <div class="tag-wrapper relative">
                                <div class="tag-container min-h-[48px] p-2 bg-surface-container-low border border-outline-variant/50 rounded-lg flex flex-wrap gap-2 items-center cursor-text transition-all focus-within:ring-1 focus-within:ring-tertiary-container" @click="$refs.tagInput.focus()">
                                    <template x-for="tag in formData.tags" :key="tag">
                                        <span class="bg-secondary-container text-on-secondary-container px-3 py-1 rounded-sm font-label-md text-xs flex items-center gap-2 group transition-all">
                                            <span x-text="tag"></span>
                                            <span class="material-symbols-outlined text-sm cursor-pointer hover:text-error transition-colors" @click.stop="removeTag(tag)">close</span>
                                        </span>
                                    </template>
                                    <input type="text" id="tag-input" x-ref="tagInput" x-model="tagInput" @input="updateSuggestions" @keydown.enter.prevent="addTag" @keydown.backspace="handleBackspace" placeholder="Type and press enter..." class="flex-1 bg-transparent border-none focus:ring-0 font-body-md p-1 min-w-[120px]" @click.away="suggestions = []">
                                </div>
                                <div class="suggestions-list absolute top-full left-0 w-full mt-1 bg-surface-container-lowest border border-outline-variant/30 rounded-lg shadow-lg z-50 max-h-48 overflow-y-auto" x-show="suggestions.length > 0" style="display: none;">
                                    <template x-for="suggestion in suggestions" :key="suggestion">
                                        <div class="p-3 hover:bg-surface-container-low cursor-pointer transition-colors font-body-md border-b border-surface-variant/10 last:border-0" x-text="suggestion" @click="addTagFromSuggestion(suggestion)"></div>
                                    </template>
                                </div>
                            </div>
                        </div>
                        
                        <div id="versions-container" class="space-y-md pt-md">
                            <div class="flex justify-between items-center border-b border-surface-variant/20 pb-base">
                                <h3 class="font-headline-md text-lg text-primary tracking-tight">Musical Versions</h3>
                                <button type="button" id="add-version" @click="addVersion" class="text-secondary hover:text-primary font-label-md text-xs uppercase tracking-widest flex items-center gap-1 transition-colors">
                                    <span class="material-symbols-outlined text-sm">add</span>
                                    Add New Arrangement
                                </button>
                            </div>

                            <template x-for="(version, vIndex) in formData.versions" :key="version.id">
                                <div class="bg-surface-container-low/50 border border-outline-variant/20 rounded-xl p-md space-y-md relative overflow-hidden">
                                    <div class="flex justify-between items-center">
                                        <div class="flex items-center gap-2">
                                            <span class="w-6 h-6 rounded-full bg-primary text-on-primary flex items-center justify-center font-label-md text-[10px]" x-text="vIndex + 1"></span>
                                            <input type="text" class="bg-transparent border-none focus:ring-0 font-headline-md text-primary p-0 text-lg placeholder:opacity-40" x-model="version.name" placeholder="Version Name (e.g. Traditional SATB)" required>
                                        </div>
                                        <button type="button" class="text-error/60 hover:text-error transition-colors p-1" @click="removeVersion(vIndex)">
                                            <span class="material-symbols-outlined text-sm">delete_sweep</span>
                                        </button>
                                    </div>

                                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-md">
                                        <template x-for="(page, pIndex) in version.pages" :key="page.id">
                                            <div class="bg-surface-container-lowest border border-outline-variant/30 rounded-lg p-md flex flex-col gap-md shadow-sm relative group">
                                                <div class="flex justify-between items-center">
                                                    <span class="font-label-md text-[10px] uppercase tracking-widest text-on-surface-variant" x-text="'Sheet Page ' + (pIndex + 1)"></span>
                                                    <button type="button" class="text-error/40 hover:text-error transition-colors" @click="removePage(vIndex, pIndex)">
                                                        <span class="material-symbols-outlined text-sm">close</span>
                                                    </button>
                                                </div>

                                                <template x-if="page.url">
                                                    <div class="relative aspect-[3/4] bg-surface-container-low rounded border border-outline-variant/10 overflow-hidden group/img">
                                                        <img :src="page.url" class="w-full h-full object-cover">
                                                        <div class="absolute inset-0 bg-primary/40 opacity-0 group-hover/img:opacity-100 transition-opacity flex items-center justify-center">
                                                            <a :href="page.url" target="_blank" class="bg-surface-container-lowest text-primary p-2 rounded-full shadow-lg">
                                                                <span class="material-symbols-outlined">visibility</span>
                                                            </a>
                                                        </div>
                                                    </div>
                                                </template>
                                                
                                                <div class="flex flex-col gap-1">
                                                    <label class="font-label-md text-[9px] uppercase tracking-widest text-on-surface-variant" x-text="page.url ? 'Replace Sheet' : 'Upload Sheet'"></label>
                                                    <input type="file" class="text-[11px] file:mr-4 file:py-1 file:px-3 file:rounded-sm file:border-0 file:text-[10px] file:font-label-md file:bg-surface-container file:text-on-surface-variant hover:file:bg-surface-container-high cursor-pointer transition-all" accept="image/*" @change="handleFileChange($event, vIndex, pIndex)" :required="!page.url">
                                                </div>
                                            </div>
                                        </template>
                                        
                                        <!-- Add Page Button -->
                                        <button type="button" @click="addPage(vIndex)" class="border-2 border-dashed border-outline-variant/30 rounded-lg flex flex-col items-center justify-center gap-2 p-md hover:bg-surface-container-low hover:border-primary/20 transition-all text-on-surface-variant hover:text-primary min-h-[160px]">
                                            <span class="material-symbols-outlined text-2xl">add_photo_alternate</span>
                                            <span class="font-label-md text-[10px] uppercase tracking-widest">Add Page</span>
                                        </button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </form>
                </div>

                <div class="p-md border-t border-surface-variant/20 bg-surface-container-low/50 flex justify-end items-center gap-md">
                    <button type="button" @click="resetForm()" class="text-secondary hover:text-error font-label-md text-xs uppercase tracking-widest transition-colors" :disabled="isSubmitting">
                        Cancel
                    </button>
                    <button type="button" @click="handleSubmit()" :disabled="isSubmitting" class="bg-primary text-on-primary font-label-md text-label-md px-lg py-3 rounded-lg hover:bg-primary-container transition-all shadow-sm active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
                        <span x-show="isSubmitting" class="w-4 h-4 border-2 border-on-primary/30 border-t-on-primary rounded-full animate-spin"></span>
                        <span x-text="isSubmitting ? (isEditing ? 'Syncing Changes...' : 'Creating Hymn...') : (isEditing ? 'Update Hymn' : 'Register Hymn')"></span>
                    </button>
                </div>
            </div>
        </div>
    </main>
    <script src="manager.js"></script>
</body>
</html>
