<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Document | Mosaic Shepherd</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-primary": "#b2c6f8", "surface-variant": "#e5e2dc", "on-primary": "#ffffff",
                        "primary": "#001a43", "on-primary-fixed-variant": "#314670", "on-tertiary-container": "#67a1b5",
                        "on-secondary-fixed-variant": "#2b4969", "surface-container-low": "#f6f3ed", "tertiary": "#001f28",
                        "on-tertiary-fixed": "#001f28", "secondary-container": "#b9d7fe", "secondary-fixed-dim": "#abc9ef",
                        "surface": "#fcf9f3", "outline-variant": "#c5c6d0", "primary-container": "#1a3059",
                        "secondary": "#436082", "on-secondary": "#ffffff", "on-surface": "#1c1c18",
                        "primary-fixed": "#d8e2ff", "surface-container-highest": "#e5e2dc", "on-primary-container": "#8499c8",
                        "on-secondary-fixed": "#001d36", "surface-dim": "#dcdad4", "on-secondary-container": "#415e7f",
                        "on-surface-variant": "#44474e", "tertiary-container": "#003643", "primary-fixed-dim": "#b2c6f8",
                        "tertiary-fixed-dim": "#95cfe4", "tertiary-fixed": "#b5ebff", "on-primary-fixed": "#001a42",
                        "error": "#ba1a1a", "surface-bright": "#fcf9f3", "on-background": "#1c1c18",
                        "on-tertiary-fixed-variant": "#004e60", "secondary-fixed": "#d1e4ff", "on-tertiary": "#ffffff",
                        "on-error": "#ffffff", "inverse-surface": "#31312d", "on-error-container": "#93000a",
                        "outline": "#75777f", "surface-container": "#f0eee8", "surface-container-high": "#ebe8e2",
                        "inverse-on-surface": "#f3f0ea", "surface-tint": "#4a5e8a", "surface-container-lowest": "#ffffff",
                        "background": "#fcf9f3", "error-container": "#ffdad6"
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                    spacing: {
                        "gutter": "24px", "base": "8px", "md": "24px", "xs": "4px",
                        "xl": "80px", "margin": "32px", "sm": "12px", "lg": "48px"
                    },
                    fontFamily: {
                        "headline-md": ["Noto Serif"], "display-lg": ["Noto Serif"],
                        "label-md": ["Work Sans"], "headline-lg": ["Noto Serif"],
                        "body-lg": ["Work Sans"], "body-md": ["Work Sans"]
                    },
                    fontSize: {
                        "headline-md": ["24px", { lineHeight: "1.3", fontWeight: "600" }],
                        "display-lg": ["48px", { lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "700" }],
                        "label-md": ["14px", { lineHeight: "1.2", letterSpacing: "0.05em", fontWeight: "600" }],
                        "headline-lg": ["32px", { lineHeight: "1.2", fontWeight: "600" }],
                        "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
                        "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }]
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        [x-cloak] { display: none !important; }
        .ProseMirror { outline: none; min-height: 100%; padding: 24px; box-sizing: border-box; }
        .ProseMirror p { margin: 0 0 0.5em; }
        .ProseMirror p:last-child { margin-bottom: 0; }
        .ProseMirror ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 0.5em; }
        .ProseMirror ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 0.5em; }
        .ProseMirror li p { margin: 0; }
        .mention-chip { display:inline; background:#d8e2ff; color:#001a42; border-radius:3px; padding:0 4px; font-weight:500; text-decoration:none; cursor:pointer; }
        a.mention-chip:hover { background:#b2c6f8; }
        .ProseMirror .mention-chip { cursor:default; }
        .ProseMirror table { border-collapse:collapse; width:100%; margin-bottom:0.5em; table-layout:fixed; }
        .ProseMirror th, .ProseMirror td { border:1px solid #c5c6d0; padding:4px 8px; min-width:50px; position:relative; vertical-align:top; }
        .ProseMirror th { background:#f0eee8; font-weight:600; }
        .selectedCell { background:#d8e2ff !important; }
        .note-table { border-collapse:collapse; width:100%; margin-bottom:0.5em; }
        .note-table th, .note-table td { border:1px solid #c5c6d0; padding:4px 8px; text-align:left; vertical-align:top; }
        .note-table th { background:#f0eee8; font-weight:600; }
        .person-panel { border:1px solid #b2c6f8; border-radius:8px; margin:8px 0; overflow:hidden; display:block; background:#f0f4ff; }
        .person-panel-header { background:#dce6ff; border-bottom:1px solid #b2c6f8; padding:6px 12px; display:flex; align-items:center; gap:8px; }
        .person-panel-name { font-family:'Work Sans',sans-serif; font-size:13px; font-weight:600; color:#001a43; background:transparent; border:none; cursor:pointer; padding:2px 6px; border-radius:4px; white-space:nowrap; }
        .person-panel-name:hover { background:#dcdad4; }
        .person-panel-type { font-family:'Work Sans',sans-serif; font-size:12px; color:#44474e; background:transparent; border:1px solid #c5c6d0; border-radius:4px; padding:2px 4px; cursor:pointer; }
        .person-panel-view-link { font-family:'Work Sans',sans-serif; font-size:12px; color:#436082; text-decoration:none; margin-left:auto; white-space:nowrap; }
        .person-panel-view-link:hover { text-decoration:underline; }
        .person-panel-delete { background:transparent; border:none; cursor:pointer; color:#75777f; padding:2px; display:flex; align-items:center; line-height:1; flex-shrink:0; }
        .person-panel-delete:hover { color:#ba1a1a; }
        .person-panel-body { background:#f0f4ff; min-height:80px; }
        .person-panel-body .ProseMirror { min-height:80px; padding:12px; box-sizing:border-box; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-functions-compat.js"></script>
    <script src="auth.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-background text-on-background font-body-md text-body-md antialiased h-screen overflow-hidden flex flex-col"
      x-data="documentEditor" x-cloak>

    <!-- Header -->
    <header class="w-full max-w-4xl mx-auto px-4 md:px-margin pt-2 md:pt-md flex items-center justify-between">
        <a href="shepherding-documents.html" class="flex items-center gap-1 text-on-surface-variant hover:text-primary transition-colors duration-200">
            <span class="material-symbols-outlined text-[20px]">arrow_back</span>
            <span class="font-label-md text-label-md">Documents</span>
        </a>
        <div class="flex items-center gap-md">
            <!-- Save status -->
            <div class="flex items-center gap-xs">
                <template x-if="saveStatus === 'saving'">
                    <span class="flex items-center gap-xs font-label-md text-label-md text-on-surface-variant">
                        <span class="material-symbols-outlined text-[14px] animate-spin">progress_activity</span>
                        Saving…
                    </span>
                </template>
                <template x-if="saveStatus === 'saved'">
                    <span class="flex items-center gap-xs font-label-md text-label-md text-on-surface-variant">
                        <span class="material-symbols-outlined text-[14px]">check_circle</span>
                        Saved
                    </span>
                </template>
                <template x-if="saveStatus === 'unsaved'">
                    <span class="font-label-md text-label-md text-outline">Unsaved changes</span>
                </template>
            </div>
            <div id="auth-container" class="flex items-center">
                <div class="h-10"></div>
            </div>
        </div>
    </header>

    <!-- Loading -->
    <div x-show="loading" class="flex-grow flex items-center justify-center">
        <span class="material-symbols-outlined text-[48px] text-outline animate-spin">progress_activity</span>
    </div>

    <!-- Main -->
    <main x-show="!loading" class="flex-grow overflow-hidden max-w-4xl w-full mx-auto px-4 md:px-margin pb-lg flex flex-col gap-sm pt-md">

        <!-- Title -->
        <input type="text"
               x-model="title"
               @input="onTitleInput()"
               placeholder="Document title…"
               class="w-full font-headline-lg text-headline-lg text-primary bg-transparent border-0 border-b-2 border-transparent focus:border-outline-variant focus:outline-none pb-xs transition-colors placeholder-outline" />

        <!-- Metadata -->
        <div class="flex flex-wrap items-center gap-sm pb-xs border-b border-outline-variant">
            <span class="font-label-md text-label-md text-on-surface-variant"
                  x-text="'Created by ' + (doc?.authorName || '…')"></span>
            <template x-if="doc?.createdAt">
                <span class="font-label-md text-label-md text-outline">·</span>
            </template>
            <span class="font-label-md text-label-md text-on-surface-variant"
                  x-text="formatDate(doc?.createdAt)"></span>
        </div>

        <!-- Editor card -->
        <div class="bg-surface-container-lowest border border-outline-variant rounded-xl flex flex-col flex-grow overflow-hidden">

            <!-- Toolbar -->
            <div class="flex items-center flex-wrap gap-xs px-md py-xs border-b border-outline-variant bg-surface-container rounded-t-xl">

                <!-- Font Family -->
                <select @change="setFontFamily($event.target.value)"
                        class="border border-outline-variant rounded px-2 py-1 text-xs font-label-md text-on-surface-variant bg-surface-container hover:bg-surface-container-high focus:outline-none focus:ring-1 focus:ring-primary/30 cursor-pointer">
                    <option value="">Font</option>
                    <option value="Work Sans, sans-serif">Work Sans</option>
                    <option value="Noto Serif, serif">Noto Serif</option>
                    <option value="monospace">Monospace</option>
                </select>

                <!-- Font Size -->
                <select @change="setFontSize($event.target.value)"
                        class="border border-outline-variant rounded px-2 py-1 text-xs font-label-md text-on-surface-variant bg-surface-container hover:bg-surface-container-high focus:outline-none focus:ring-1 focus:ring-primary/30 cursor-pointer">
                    <option value="">Size</option>
                    <option value="12px">Small (12)</option>
                    <option value="14px">14</option>
                    <option value="16px">Normal (16)</option>
                    <option value="18px">18</option>
                    <option value="20px">Large (20)</option>
                    <option value="24px">24</option>
                    <option value="32px">Heading</option>
                </select>

                <div class="w-px h-5 bg-outline-variant mx-xs"></div>

                <button type="button" @mousedown.prevent="editorCmd('toggleBold')"
                    :class="editorUpdated >= 0 && isActive('bold') ? 'bg-primary text-on-primary' : 'text-on-surface-variant hover:bg-surface-container-high'"
                    class="w-8 h-8 rounded flex items-center justify-center font-bold text-sm transition-colors" title="Bold">B</button>
                <button type="button" @mousedown.prevent="editorCmd('toggleItalic')"
                    :class="editorUpdated >= 0 && isActive('italic') ? 'bg-primary text-on-primary' : 'text-on-surface-variant hover:bg-surface-container-high'"
                    class="w-8 h-8 rounded flex items-center justify-center italic text-sm transition-colors" title="Italic">I</button>
                <button type="button" @mousedown.prevent="editorCmd('toggleUnderline')"
                    :class="editorUpdated >= 0 && isActive('underline') ? 'bg-primary text-on-primary' : 'text-on-surface-variant hover:bg-surface-container-high'"
                    class="w-8 h-8 rounded flex items-center justify-center underline text-sm transition-colors" title="Underline">U</button>

                <div class="w-px h-5 bg-outline-variant mx-xs"></div>

                <button type="button" @mousedown.prevent="editorCmd('toggleBulletList')"
                    :class="editorUpdated >= 0 && isActive('bulletList') ? 'bg-primary text-on-primary' : 'text-on-surface-variant hover:bg-surface-container-high'"
                    class="w-8 h-8 rounded flex items-center justify-center transition-colors" title="Bullet list">
                    <span class="material-symbols-outlined text-[16px]">format_list_bulleted</span>
                </button>
                <button type="button" @mousedown.prevent="editorCmd('toggleOrderedList')"
                    :class="editorUpdated >= 0 && isActive('orderedList') ? 'bg-primary text-on-primary' : 'text-on-surface-variant hover:bg-surface-container-high'"
                    class="w-8 h-8 rounded flex items-center justify-center transition-colors" title="Numbered list">
                    <span class="material-symbols-outlined text-[16px]">format_list_numbered</span>
                </button>

                <div class="w-px h-5 bg-outline-variant mx-xs"></div>

                <!-- Highlight -->
                <div class="relative" x-data="{ open: false }">
                    <button type="button" @mousedown.prevent="open = !open"
                        :class="editorUpdated >= 0 && isActive('highlight') ? 'bg-primary text-on-primary' : 'text-on-surface-variant hover:bg-surface-container-high'"
                        class="w-8 h-8 rounded flex items-center justify-center transition-colors" title="Highlight">
                        <span class="material-symbols-outlined text-[16px]">highlight</span>
                    </button>
                    <div x-show="open" style="display:none;min-width:116px"
                         class="absolute top-full left-0 mt-1 bg-surface-container-lowest border border-outline-variant rounded-lg shadow-md z-50 p-2 flex flex-wrap gap-1">
                        <button type="button" @mousedown.prevent="setHighlight('#fef08a'); open = false" class="w-6 h-6 rounded border border-outline-variant hover:scale-110 transition-transform" style="background:#fef08a" title="Yellow"></button>
                        <button type="button" @mousedown.prevent="setHighlight('#bbf7d0'); open = false" class="w-6 h-6 rounded border border-outline-variant hover:scale-110 transition-transform" style="background:#bbf7d0" title="Green"></button>
                        <button type="button" @mousedown.prevent="setHighlight('#bfdbfe'); open = false" class="w-6 h-6 rounded border border-outline-variant hover:scale-110 transition-transform" style="background:#bfdbfe" title="Blue"></button>
                        <button type="button" @mousedown.prevent="setHighlight('#fecaca'); open = false" class="w-6 h-6 rounded border border-outline-variant hover:scale-110 transition-transform" style="background:#fecaca" title="Red"></button>
                        <button type="button" @mousedown.prevent="setHighlight('#fed7aa'); open = false" class="w-6 h-6 rounded border border-outline-variant hover:scale-110 transition-transform" style="background:#fed7aa" title="Orange"></button>
                        <button type="button" @mousedown.prevent="setHighlight('#f0abfc'); open = false" class="w-6 h-6 rounded border border-outline-variant hover:scale-110 transition-transform" style="background:#f0abfc" title="Purple"></button>
                        <button type="button" @mousedown.prevent="setHighlight(null); open = false" class="w-6 h-6 rounded border border-outline-variant hover:bg-surface-container flex items-center justify-center text-on-surface-variant" title="Remove highlight">
                            <span class="material-symbols-outlined text-[12px]">close</span>
                        </button>
                    </div>
                </div>

                <!-- Table insert -->
                <div class="flex items-center gap-xs" x-data="{ tRows: 3, tCols: 3 }">
                    <span class="font-label-md text-label-md text-on-surface-variant text-xs">Table</span>
                    <input type="number" x-model.number="tRows" min="1" max="20"
                           class="w-10 h-6 border border-outline-variant rounded px-1 text-xs text-center bg-surface focus:outline-none focus:ring-1 focus:ring-primary/30" title="Rows" />
                    <span class="text-xs text-on-surface-variant">×</span>
                    <input type="number" x-model.number="tCols" min="1" max="20"
                           class="w-10 h-6 border border-outline-variant rounded px-1 text-xs text-center bg-surface focus:outline-none focus:ring-1 focus:ring-primary/30" title="Cols" />
                    <button type="button" @mousedown.prevent="insertTable(tRows, tCols)"
                        class="w-6 h-6 rounded flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors" title="Insert table">
                        <span class="material-symbols-outlined text-[14px]">add</span>
                    </button>
                </div>

                <div class="w-px h-5 bg-outline-variant mx-xs"></div>

                <!-- Person Panel -->
                <button type="button" @mousedown.prevent="insertPersonPanel()"
                    class="flex items-center gap-xs px-2 py-1 text-xs font-label-md text-on-surface-variant hover:bg-surface-container-high rounded transition-colors"
                    title="Insert Person Note panel (or type /person)">
                    <span class="material-symbols-outlined text-[14px]">person_add</span>
                    Person Note
                </button>
            </div>

            <!-- Table contextual toolbar -->
            <div x-show="editorUpdated >= 0 && isActive('table')"
                 style="display:none"
                 class="flex items-center flex-wrap gap-xs px-md py-xs border-b border-outline-variant bg-secondary-container/30">
                <span class="font-label-md text-label-md text-on-surface-variant text-xs mr-xs">Table:</span>
                <button type="button" @mousedown.prevent="editorCmd('addColumnBefore')" class="px-2 py-1 text-xs font-label-md text-on-surface-variant hover:bg-surface-container rounded transition-colors">+ Col ←</button>
                <button type="button" @mousedown.prevent="editorCmd('addColumnAfter')"  class="px-2 py-1 text-xs font-label-md text-on-surface-variant hover:bg-surface-container rounded transition-colors">+ Col →</button>
                <button type="button" @mousedown.prevent="editorCmd('deleteColumn')"    class="px-2 py-1 text-xs font-label-md text-on-surface-variant hover:bg-error/10 hover:text-error rounded transition-colors">− Col</button>
                <div class="w-px h-4 bg-outline-variant mx-xs"></div>
                <button type="button" @mousedown.prevent="editorCmd('addRowBefore')"   class="px-2 py-1 text-xs font-label-md text-on-surface-variant hover:bg-surface-container rounded transition-colors">+ Row ↑</button>
                <button type="button" @mousedown.prevent="editorCmd('addRowAfter')"    class="px-2 py-1 text-xs font-label-md text-on-surface-variant hover:bg-surface-container rounded transition-colors">+ Row ↓</button>
                <button type="button" @mousedown.prevent="editorCmd('deleteRow')"      class="px-2 py-1 text-xs font-label-md text-on-surface-variant hover:bg-error/10 hover:text-error rounded transition-colors">− Row</button>
                <div class="w-px h-4 bg-outline-variant mx-xs"></div>
                <button type="button" @mousedown.prevent="editorCmd('deleteTable')"    class="px-2 py-1 text-xs font-label-md text-error hover:bg-error/10 rounded transition-colors">Delete table</button>
            </div>

            <!-- TipTap mount point -->
            <div id="tiptap-doc-editor"
                 class="font-body-md text-on-surface bg-surface-container-lowest flex-grow overflow-y-auto cursor-text rounded-b-xl"
                 @click="if (!$event.target.closest('.person-panel')) focusEditor()">
            </div>
        </div>
    </main>

    <!-- Person Picker Modal -->
    <div x-show="showPersonPicker" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-black/40"
         @keydown.escape.window="showPersonPicker = false">
        <div class="bg-surface-container-lowest rounded-xl shadow-2xl w-full max-w-md mx-4 flex flex-col max-h-[80vh]">
            <div class="flex items-center justify-between px-lg py-md border-b border-outline-variant flex-shrink-0">
                <h3 class="font-headline-md text-headline-md text-on-surface"
                    x-text="pickerStep === 'person' ? 'Select person' : 'Note options for ' + (pickerSelected?.name || '')"></h3>
                <button @click="showPersonPicker = false" class="text-on-surface-variant hover:text-on-surface transition-colors">
                    <span class="material-symbols-outlined text-[20px]">close</span>
                </button>
            </div>

            <!-- Step 1: person search -->
            <div x-show="pickerStep === 'person'" class="flex flex-col gap-sm p-lg overflow-hidden">
                <input type="text" x-model="pickerSearch" placeholder="Search people…"
                       @keydown.stop
                       class="w-full border border-outline-variant rounded-lg px-sm py-xs font-body-md text-sm bg-surface focus:outline-none focus:ring-2 focus:ring-primary/30" />
                <div class="overflow-y-auto flex flex-col" style="max-height:320px">
                    <template x-for="person in filteredPeople" :key="person.id">
                        <button @click="selectPersonForPicker(person)"
                            class="text-left px-sm py-xs hover:bg-surface-container rounded-lg font-body-md text-sm text-on-surface transition-colors">
                            <span x-text="person.name"></span>
                        </button>
                    </template>
                    <div x-show="filteredPeople.length === 0"
                         class="text-on-surface-variant italic text-sm px-sm py-xs">No people found.</div>
                </div>
            </div>

            <!-- Step 2: note mode -->
            <div x-show="pickerStep === 'note-mode'" class="flex flex-col gap-md p-lg overflow-y-auto">
                <div class="flex flex-col gap-sm">
                    <label class="flex items-start gap-sm cursor-pointer p-sm rounded-lg hover:bg-surface-container transition-colors">
                        <input type="radio" value="new" x-model="pickerNoteMode" class="mt-0.5" />
                        <div>
                            <div class="font-label-md text-label-md text-on-surface">New note</div>
                            <div class="font-body-md text-xs text-on-surface-variant">Create a fresh Shepherding Note linked to this panel</div>
                        </div>
                    </label>
                    <label class="flex items-start gap-sm cursor-pointer p-sm rounded-lg hover:bg-surface-container transition-colors">
                        <input type="radio" value="existing" x-model="pickerNoteMode" class="mt-0.5" />
                        <div>
                            <div class="font-label-md text-label-md text-on-surface">Link existing note</div>
                            <div class="font-body-md text-xs text-on-surface-variant">Pull an existing Shepherding Note into this panel</div>
                        </div>
                    </label>
                </div>

                <!-- Existing notes list -->
                <div x-show="pickerNoteMode === 'existing'" class="flex flex-col gap-xs border-t border-outline-variant pt-sm">
                    <div x-show="pickerExistingNotes.length === 0"
                         class="text-on-surface-variant italic text-sm">No existing notes for this person.</div>
                    <template x-for="n in pickerExistingNotes" :key="n.id">
                        <label class="flex items-center gap-sm cursor-pointer px-sm py-xs hover:bg-surface-container rounded-lg transition-colors">
                            <input type="radio" :value="n.id" x-model="pickerSelectedNoteId" />
                            <div class="flex flex-col min-w-0">
                                <span class="font-label-md text-label-md text-on-surface truncate"
                                      x-text="n.subject || (n.type + (n.createdAt ? ' · ' + formatDate(n.createdAt) : ''))"></span>
                                <span class="text-xs text-on-surface-variant" x-text="n.type"></span>
                            </div>
                        </label>
                    </template>
                </div>

                <div class="flex items-center justify-between gap-sm border-t border-outline-variant pt-md">
                    <button @click="pickerStep = 'person'"
                        class="px-md py-xs font-label-md text-label-md text-on-surface-variant hover:bg-surface-container rounded-lg transition-colors">
                        ← Back
                    </button>
                    <button @click="confirmPersonPicker()"
                        :disabled="pickerNoteMode === 'existing' && !pickerSelectedNoteId"
                        class="px-md py-xs font-label-md text-label-md bg-primary text-on-primary rounded-lg hover:bg-primary/90 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
                        Insert panel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Panel Delete Dialog -->
    <div x-show="showPanelDeleteDialog" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-black/40"
         @keydown.escape.window="showPanelDeleteDialog = false">
        <div class="bg-surface-container-lowest rounded-xl shadow-2xl w-full max-w-sm mx-4 p-lg flex flex-col gap-md">
            <h3 class="font-headline-md text-headline-md text-on-surface">Remove person panel</h3>
            <p class="font-body-md text-on-surface-variant text-sm">
                What should happen to the Shepherding Note for
                <span class="font-semibold text-on-surface" x-text="panelDeletePersonName"></span>?
            </p>
            <div class="flex flex-col gap-sm">
                <button @click="executePanelDelete(false)"
                    class="w-full px-md py-sm font-label-md text-label-md bg-primary text-on-primary rounded-lg hover:bg-primary/90 transition-colors text-left">
                    Keep note on profile
                    <span class="block font-body-md text-xs font-normal opacity-80 mt-xs">The note stays on their Shepherding Profile, unlinked from this document.</span>
                </button>
                <button @click="executePanelDelete(true)"
                    class="w-full px-md py-sm font-label-md text-label-md bg-error text-on-error rounded-lg hover:bg-error/90 transition-colors text-left">
                    Delete note entirely
                    <span class="block font-body-md text-xs font-normal opacity-80 mt-xs">Permanently removes the note from their Shepherding Profile too.</span>
                </button>
                <button @click="showPanelDeleteDialog = false"
                    class="px-md py-xs font-label-md text-label-md text-on-surface-variant hover:bg-surface-container rounded-lg transition-colors">
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div x-show="toast.show" x-cloak x-transition
         class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-lg py-sm rounded-lg shadow-lg font-label-md text-label-md"
         :class="toast.type === 'error' ? 'bg-error text-on-error' : 'bg-inverse-surface text-inverse-on-surface'">
        <span x-text="toast.message"></span>
    </div>

    <script src="shepherding-document.js"></script>
</body>
</html>
