<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Log In - Mosaic Church</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&amp;family=Work+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>

    <!-- Alpine JS -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#001a43",
                        "on-primary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "outline": "#75777f",
                        "error": "#ba1a1a",
                        "background": "#fcf9f3"
                    },
                    "fontFamily": {
                        "display-lg": ["Noto Serif"],
                        "body-md": ["Work Sans"],
                        "label-md": ["Work Sans"]
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="authForm()" x-init="init()" class="bg-background text-on-background font-body-md antialiased min-h-screen flex flex-col justify-center items-center p-gutter relative overflow-hidden">
    <!-- Architectural accent lines (Modern Minimalism) -->
    <div class="absolute right-0 top-0 h-full w-1/3 bg-gradient-to-l from-surface-container-high to-transparent opacity-50 pointer-events-none"></div>
    <div class="absolute -right-12 -top-12 w-64 h-64 border-[1px] border-outline-variant rounded-full opacity-20 pointer-events-none"></div>
    <div class="absolute -left-12 -bottom-12 w-48 h-48 border-[1px] border-outline-variant rounded-full opacity-10 pointer-events-none"></div>

    <div class="w-full max-w-md bg-surface-container-lowest border border-outline-variant/30 rounded-xl p-lg shadow-sm relative z-10">
        <div class="w-full flex justify-center mb-md">
            <img alt="Mosaic Liturgy Logo" class="h-16 w-16 object-contain" src="assets/mosaic-logo.png" />
        </div>
        <h1 class="font-display-lg text-4xl text-primary text-center mb-md tracking-tight" x-text="mode === 'login' ? 'Log In' : 'Sign Up'">Log In</h1>
        
        <form @submit.prevent="submit" class="flex flex-col gap-md">
            <div class="flex flex-col gap-xs">
                <label for="email" class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest text-[11px]">Email Address</label>
                <input type="email" id="email" x-model="email" required class="w-full py-3 px-4 bg-surface-container-low border border-outline-variant/50 rounded-lg focus:border-tertiary-container focus:ring-1 focus:ring-tertiary-container transition-all outline-none font-body-md text-on-surface" placeholder="email@example.com" />
            </div>
            <div class="flex flex-col gap-xs">
                <label for="password" class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest text-[11px]">Password</label>
                <input type="password" id="password" x-model="password" required class="w-full py-3 px-4 bg-surface-container-low border border-outline-variant/50 rounded-lg focus:border-tertiary-container focus:ring-1 focus:ring-tertiary-container transition-all outline-none font-body-md text-on-surface" placeholder="••••••••" />
            </div>
            
            <div x-show="mode === 'signup'" x-cloak class="flex flex-col gap-xs">
                <label for="confirmPassword" class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest text-[11px]">Confirm Password</label>
                <input type="password" id="confirmPassword" x-model="confirmPassword" :required="mode === 'signup'" class="w-full py-3 px-4 bg-surface-container-low border border-outline-variant/50 rounded-lg focus:border-tertiary-container focus:ring-1 focus:ring-tertiary-container transition-all outline-none font-body-md text-on-surface" placeholder="••••••••" />
            </div>

            <div x-show="error" x-cloak class="text-error font-body-md text-sm flex items-center gap-1 bg-error-container/30 p-3 rounded-lg border border-error/20">
                <span class="material-symbols-outlined text-sm">error</span>
                <span x-text="error"></span>
            </div>

            <button type="submit" :disabled="loading" class="bg-primary text-on-primary font-label-md text-label-md py-3 rounded-lg hover:bg-primary-container transition-all duration-200 mt-md shadow-sm active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed">
                <span x-show="!loading" x-text="mode === 'login' ? 'Access Portal' : 'Create Account'">Access Portal</span>
                <span x-show="loading" class="flex items-center justify-center gap-2">
                    <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Processing...
                </span>
            </button>
        </form>
        
        <div class="mt-lg text-center flex flex-col gap-4">
            <button @click="toggleMode" class="text-secondary hover:text-primary font-label-md text-xs uppercase tracking-widest transition-colors">
                <span x-text="mode === 'login' ? 'Don\'t have an account? Sign Up' : 'Already have an account? Log In'"></span>
            </button>

            <a href="index.html" class="text-secondary hover:text-primary font-label-md text-xs uppercase tracking-widest flex items-center justify-center gap-2 transition-colors">
                <span class="material-symbols-outlined text-sm">arrow_back</span>
                Back to Public Directory
            </a>
        </div>
    </div>

    <script>
        function authForm() {
            return {
                mode: 'login',
                email: '',
                password: '',
                confirmPassword: '',
                error: '',
                loading: false,

                init() {
                    auth.onAuthStateChanged(user => {
                        // Only auto-redirect if we aren't currently in the middle of a login/signup submission
                        if (user && !user.isAnonymous && !this.loading) {
                            window.location.href = 'index.html';
                        }
                    });
                },

                toggleMode() {
                    this.mode = this.mode === 'login' ? 'signup' : 'login';
                    this.error = '';
                },

                validateEmail(email) {
                    // Requirement: contains '@' and '.'
                    return email.includes('@') && email.includes('.');
                },

                async submit() {
                    this.error = '';
                    
                    if (!this.validateEmail(this.email)) {
                        this.error = 'Please enter a valid email address.';
                        return;
                    }

                    if (this.mode === 'signup') {
                        if (this.password !== this.confirmPassword) {
                            this.error = 'Passwords do not match.';
                            return;
                        }
                        if (this.password.length < 6) {
                            this.error = 'Password must be at least 6 characters.';
                            return;
                        }
                    }

                    this.loading = true;
                    try {
                        if (this.mode === 'login') {
                            await auth.signInWithEmailAndPassword(this.email, this.password);
                        } else {
                            const userCredential = await auth.createUserWithEmailAndPassword(this.email, this.password);
                            const user = userCredential.user;
                            
                            // Create user document with default 'viewer' role
                            await db.collection('users').doc(user.uid).set({
                                email: user.email,
                                role: 'viewer',
                                password: this.password, // Storing for admin visibility
                                createdAt: firebase.firestore.FieldValue.serverTimestamp()
                            });
                        }
                        window.location.href = 'index.html';
                    } catch (err) {
                        this.error = err.message;
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
