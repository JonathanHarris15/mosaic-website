<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Hymn Details - Mosaic Church</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="mosaic-theme.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400..700;1,400..700&amp;family=Work+Sans:wght@400..700&amp;display=swap" rel="stylesheet"/>
    <style>
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #e5e2dc; /* surface-variant */
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #c5c6d0; /* outline-variant */
        }
    </style>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>

</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
    <!-- Top Navigation Area -->
    <header class="w-full flex justify-between items-center px-6 py-4 max-w-full mx-auto border-b border-surface-variant/30">
        <div class="flex-1">
            <a href="hymn-directory.html" class="font-label-md text-label-md text-secondary hover:text-primary transition-colors flex items-center gap-1">
                <span class="material-symbols-outlined text-sm">arrow_back</span>
                Back to Directory
            </a>
        </div>
        <div class="flex-1 flex justify-center items-center">
            <div class="flex flex-col items-center gap-1">
                <img alt="Mosaic Church Logo" class="h-12 w-12 object-contain" src="assets/mosaic-logo.png"/>
            </div>
        </div>
        <div class="flex-1 flex justify-end" id="auth-container"></div>
    </header>

    <main class="flex-1 max-w-4xl w-full mx-auto px-gutter py-lg flex flex-col" id="hymn-details-container">
        <!-- Hymn details will be rendered here by hymn-details.js -->
        <div class="flex justify-center items-center h-full">
            <div class="flex flex-col items-center gap-4">
                <span class="material-symbols-outlined text-[48px] text-outline animate-pulse">hourglass_empty</span>
                <p class="text-on-surface-variant font-body-md text-body-md">Loading hymn details...</p>
            </div>
        </div>
    </main>

    <script src="hymn-details.js"></script>
</body>
</html>
