    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-functions-compat.js"></script>

                      "surface-container-highest": "#e5e2dc",
                      "on-secondary": "#ffffff",
                      "surface-tint": "#4a5e8a",
                      "inverse-surface": "#31312d",
                      "outline-variant": "#c5c6d0",
                      "outline": "#75777f",
                      "surface": "#fcf9f3",
                      "surface-container-low": "#f6f3ed",
                      "tertiary-fixed-dim": "#95cfe4",
                      "on-primary-fixed-variant": "#314670",
                      "on-primary-fixed": "#001a42",
                      "background": "#fcf9f3",
                      "tertiary-container": "#003643",
                      "secondary": "#436082",
                      "secondary-container": "#b9d7fe",
                      "surface-bright": "#fcf9f3",
                      "tertiary-fixed": "#b5ebff",
                      "on-primary-container": "#8499c8",
                      "secondary-fixed-dim": "#abc9ef",
                      "error-container": "#ffdad6",
                      "on-tertiary-fixed-variant": "#004e60",
                      "inverse-primary": "#b2c6f8",
                      "on-surface-variant": "#44474e",
                      "on-tertiary-container": "#67a1b5",
                      "secondary-fixed": "#d1e4ff",
                      "inverse-on-surface": "#f3f0ea",
                      "tertiary": "#001f28",
                      "surface-container": "#f0eee8",
                      "on-surface": "#1c1c18",

    <style>
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #e5e2dc; /* surface-variant */
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #c5c6d0; /* outline-variant */
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col" x-data="hymnLookup()">
    <!-- Top Navigation Area -->
    <header class="w-full flex justify-between items-center px-6 py-4 max-w-full mx-auto border-b border-surface-variant/30">
        <div class="flex-1">
            <a href="index.html" class="font-label-md text-label-md text-secondary hover:text-primary transition-colors flex items-center gap-1">
                <span class="material-symbols-outlined text-sm">arrow_back</span>
                Back to Portal
            </a>
        </div>
        <div class="flex-1 flex justify-center items-center">
            <div class="flex flex-col items-center gap-1">
                <img alt="Mosaic Church Logo" class="h-12 w-12 object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0uijHszjAD1vpPUJpbneTqxJdVo7bqoahIXaW-sv-CScZsHwzqDfrAEi3X5o8chQ9NjAlKvtZ6Cyp1ThZR3_4t8lebT5SIaTap9oaNQRrKXLV6Ql_O0oNb_OJwk4jHa3nRkpPnEV73sOQ3HRiqMM8m0-AsJ3eoIKLqxFlmrluMZDO-ldcFs4yDdEDe7K9XTLHFZD7B8TXA3dGn8CeCQzheXxD97xjChWDictUoK2cdH0-6VBzIvb0qlCCvpnUxAt0RtbGGjq-k2qxA"/>
            </div>
        </div>
        <div class="flex-1 flex justify-end"></div>
    </header>

    <main class="flex-1 max-w-[1200px] w-full mx-auto px-gutter py-lg flex flex-col h-[calc(100vh-80px)]">
        <!-- Header Section -->
        <div class="mb-md text-center">
            <h1 class="font-display-lg text-display-lg text-primary mb-sm">Hymn Directory</h1>
        </div>

        <!-- Search Bar -->
        <div class="w-full max-w-3xl mx-auto mb-lg">
            <div class="flex items-center w-full border border-outline-variant rounded-DEFAULT bg-surface-container-lowest focus-within:border-tertiary-container focus-within:ring-1 focus-within:ring-tertiary-container transition-all">
                <div class="pl-4 text-outline flex items-center">
                    <span class="material-symbols-outlined">search</span>
                </div>
                <input class="w-full py-3 px-4 bg-transparent border-none focus:ring-0 font-body-md text-body-md text-on-background placeholder:text-outline outline-none" 
                       placeholder="Search by title, lyrics, or author..." type="text"
                       x-model="searchQuery" @keydown.enter="performSearch()"/>
                <button class="bg-primary text-on-primary font-label-md text-label-md px-6 py-3 rounded-r-DEFAULT hover:bg-primary-container transition-colors"
                        @click="performSearch()">
                    Search
                </button>
            </div>
        </div>

        <!-- Two Column Layout -->
        <div class="flex flex-col md:flex-row gap-gutter flex-1 min-h-0 overflow-hidden">
            <!-- Left Column: Filter by Tags -->
            <aside class="w-full md:w-1/4 flex flex-col h-full bg-surface-container-lowest border border-outline-variant/30 rounded-lg p-md overflow-hidden">
                <div class="flex items-center gap-2 mb-sm pb-sm border-b border-surface-variant">
                    <span class="material-symbols-outlined text-primary">filter_list</span>
                    <h2 class="font-headline-md text-headline-md text-primary">Filter by Tags</h2>
                </div>
                <div class="overflow-y-auto flex-1 pr-2" x-show="allTags.length > 0">
                    <div class="space-y-1">
                        <template x-for="tag in allTags" :key="tag">
                            <button @click="toggleTag(tag)" 
                                    :class="selectedTags.includes(tag) ? 'bg-secondary-container text-on-secondary-container' : 'hover:bg-surface-container-low text-on-surface-variant'"
                                    class="w-full text-left px-3 py-2 rounded-DEFAULT font-body-md text-body-md flex justify-between items-center group transition-colors">
                                <span x-text="tag"></span>
                            </button>
                        </template>
                    </div>
                </div>
            </aside>

            <!-- Right Column: Hymn Entries -->
            <section class="w-full md:w-3/4 flex flex-col h-full overflow-hidden">
                <div class="flex justify-between items-center mb-sm">
                    <span class="font-body-md text-body-md text-on-surface-variant" x-text="'Showing ' + filteredHymns.length + ' results'"></span>
                </div>
                <div class="flex-1 overflow-y-auto pr-2 space-y-xs">
                    <template x-for="hymn in filteredHymns" :key="hymn.id">
                        <article @click="selectHymn(hymn.id)" class="bg-surface-container-lowest border border-outline-variant/30 rounded-DEFAULT px-md py-sm hover:bg-surface-container-low transition-colors group cursor-pointer">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="font-headline-lg text-headline-lg text-primary mb-0 group-hover:text-primary-container transition-colors" x-text="hymn.hymn_name"></h3>
                                    <div class="flex items-center gap-4 text-on-surface-variant font-body-md text-body-md mb-2">
                                        <span class="flex items-center gap-1">
                                            <span class="material-symbols-outlined text-sm">person</span>
                                            <span x-text="hymn.lyrics_writer + (hymn.music_writer ? ' / ' + hymn.music_writer : '')"></span>
                                        </span>
                                    </div>
                                </div>
                            </div>
                            <div class="flex flex-wrap gap-2">
                                <template x-if="hymn.tags && hymn.tags.length > 0">
                                    <template x-for="tag in hymn.tags" :key="tag">
                                        <span class="px-2 py-1 bg-surface-container border border-outline-variant/50 rounded-sm font-label-md text-label-md text-secondary" x-text="tag"></span>
                                    </template>
                                </template>
                            </div>
                        </article>
                    </template>
                </div>
            </section>
        </div>
    </main>

    <footer class="manager-login" style="margin-top: auto; padding: 20px; text-align: center; background: transparent; border-top: 1px solid rgba(0,0,0,0.1);">
        <input type="password" id="manager-password" placeholder="Manager Password" class="border border-outline-variant rounded-DEFAULT font-body-md text-body-md px-3 py-1">
        <button id="manager-login-button" class="bg-secondary text-on-secondary font-label-md px-4 py-1 rounded-DEFAULT hover:bg-primary transition-colors">Login</button>
    </footer>

    </script>
    <script src="main.js"></script>
</body>
</html>
