<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Service Analytics | Mosaic Services</title>
    <!-- Google Fonts: Noto Serif & Work Sans -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#001a43",
                        "on-primary": "#ffffff",
                        "secondary": "#436082",
                        "on-secondary": "#ffffff",
                        "surface": "#fcf9f3",
                        "background": "#fcf9f3",
                        "outline-variant": "#c5c6d0",
                        "surface-container-low": "#f6f3ed",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#1c1c18",
                        "on-surface-variant": "#44474e",
                        "error": "#ba1a1a"
                    },
                    fontFamily: {
                        "headline": ["Noto Serif", "serif"],
                        "body": ["Work Sans", "sans-serif"]
                    },
                    spacing: {
                        "gutter": "24px",
                        "md": "24px",
                        "lg": "48px",
                        "margin": "32px"
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        [x-cloak] { display: none !important; }
        .tab-active { @apply border-b-2 border-primary text-primary font-semibold; }
        .card { @apply bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm transition-all duration-200; }
        .heat-cell { @apply w-3 h-3 md:w-4 md:h-4 rounded-[2px] cursor-pointer transition-transform hover:scale-125 hover:z-10; }
        .label-xs { @apply font-body text-[10px] md:text-xs font-medium uppercase tracking-wider text-on-surface-variant; }
    </style>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-functions-compat.js"></script>
    
    <script src="auth.js"></script>
    <script src="bible-data.js"></script>
    <script type="module">
        import { analyticsPage } from './analytics.js';
        window.analyticsPage = analyticsPage;
    </script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body x-data="analyticsPage()" class="bg-background text-on-surface font-body antialiased h-screen overflow-hidden flex flex-col">
    <!-- Header -->
    <header class="flex-none w-full bg-background/80 backdrop-blur-md border-b border-outline-variant z-[100]">
        <div class="max-w-7xl mx-auto px-margin h-16 flex justify-between items-center">
            <div class="flex items-center gap-6">
                <a href="index.html" class="flex items-center gap-3 text-primary hover:opacity-70 transition-opacity group">
                    <span class="material-symbols-outlined transition-transform group-hover:-translate-x-1">arrow_back</span>
                </a>
                <div class="h-6 w-px bg-outline-variant"></div>
                <h1 class="font-headline text-xl md:text-2xl text-primary font-bold tracking-tight">Service Analytics</h1>
            </div>
            <div id="auth-container"></div>
        </div>
    </header>

    <!-- Navigation and Controls (Fixed) -->
    <div x-show="!loading" x-cloak class="flex-none bg-background z-[90] border-b border-outline-variant/30">
        <div class="max-w-7xl mx-auto px-margin">
            <!-- Navigation Tabs -->
            <div class="flex border-b border-outline-variant">
                <button @click="activeTab = 'hymns'" :class="activeTab === 'hymns' ? 'tab-active' : 'text-on-surface-variant hover:text-primary'" class="px-8 py-4 transition-all duration-200">Hymn Usage</button>
                <button @click="activeTab = 'bible'" :class="activeTab === 'bible' ? 'tab-active' : 'text-on-surface-variant hover:text-primary'" class="px-8 py-4 transition-all duration-200">Bible Heat Map</button>
            </div>

            <!-- Actions Area (Only show for Hymns tab) -->
            <div x-show="activeTab === 'hymns'" class="py-4">
                <div class="relative w-full max-w-md">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
                    <input type="text" x-model="hymnSearch" placeholder="Filter by hymn name..." 
                        class="w-full pl-12 pr-4 py-2.5 bg-surface-container-low border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all shadow-sm text-sm" />
                </div>
            </div>
        </div>
    </div>

    <!-- Scrollable Content Area -->
    <main class="flex-1 overflow-hidden">
        <div class="max-w-7xl mx-auto px-margin h-full">
            <!-- Loading State -->
            <template x-if="loading">
                <div class="py-lg h-full flex items-center justify-center">
                    <div class="card p-xl flex flex-col items-center justify-center space-y-6 min-h-[400px] w-full max-w-2xl">
                        <div class="space-y-3 text-center">
                            <div class="text-primary font-bold text-lg animate-pulse">Analyzing Historical Services...</div>
                            <div class="text-sm text-on-surface-variant" x-text="`${progress}% complete`"></div>
                        </div>
                        <div class="w-full bg-surface-container-low rounded-full h-1.5 max-w-md overflow-hidden">
                            <div class="bg-primary h-full transition-all duration-300 ease-out" :style="`width: ${progress}%`"></div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Main Content -->
            <template x-if="!loading">
                <div x-cloak class="h-full py-6 animate-in fade-in slide-in-from-bottom-4 duration-500 overflow-hidden">
                    <!-- Hymn Tab -->
                    <div x-show="activeTab === 'hymns'" x-transition class="h-full flex flex-col">
                        <div class="card flex-1 overflow-hidden flex flex-col">
                            <div class="flex-1 overflow-y-auto custom-scrollbar">
                                <table class="w-full text-left border-collapse">
                                    <thead class="bg-surface-container-low border-b border-outline-variant sticky top-0 z-10 shadow-sm">
                                    <tr>
                                        <th class="px-6 py-4 cursor-pointer hover:bg-surface-container-highest/50 transition-colors group" @click="sortBy('name')">
                                            <div class="flex items-center gap-2">
                                                <span class="label-xs">Hymn Name</span>
                                                <span class="material-symbols-outlined text-sm text-primary transition-opacity" :class="sortKey === 'name' ? 'opacity-100' : 'opacity-0'" x-text="sortOrder === 'asc' ? 'arrow_upward' : 'arrow_downward'"></span>
                                            </div>
                                        </th>
                                        <th class="px-6 py-4 cursor-pointer hover:bg-surface-container-highest/50 transition-colors group" @click="sortBy('status')">
                                            <div class="flex items-center gap-2">
                                                <span class="label-xs">Status</span>
                                                <span class="material-symbols-outlined text-sm text-primary transition-opacity" :class="sortKey === 'status' ? 'opacity-100' : 'opacity-0'" x-text="sortOrder === 'asc' ? 'arrow_upward' : 'arrow_downward'"></span>
                                            </div>
                                        </th>
                                        <th class="px-6 py-4 cursor-pointer hover:bg-surface-container-highest/50 transition-colors group" @click="sortBy('count')">
                                            <div class="flex items-center gap-2">
                                                <span class="label-xs">Times Used</span>
                                                <span class="material-symbols-outlined text-sm text-primary transition-opacity" :class="sortKey === 'count' ? 'opacity-100' : 'opacity-0'" x-text="sortOrder === 'asc' ? 'arrow_upward' : 'arrow_downward'"></span>
                                            </div>
                                        </th>
                                        <th class="px-6 py-4 cursor-pointer hover:bg-surface-container-highest/50 transition-colors group" @click="sortBy('lastUsed')">
                                            <div class="flex items-center gap-2">
                                                <span class="label-xs">Last Used</span>
                                                <span class="material-symbols-outlined text-sm text-primary transition-opacity" :class="sortKey === 'lastUsed' ? 'opacity-100' : 'opacity-0'" x-text="sortOrder === 'asc' ? 'arrow_upward' : 'arrow_downward'"></span>
                                            </div>
                                        </th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-outline-variant/30">
                                    <template x-for="h in filteredHymns" :key="h.id || h.name">
                                        <tr class="hover:bg-surface-container-low/50 transition-colors group">
                                            <td class="px-6 py-4">
                                                <div class="font-bold text-primary tracking-tight" x-text="h.name"></div>
                                            </td>
                                            <td class="px-6 py-4">
                                                <span x-show="h.id" class="px-3 py-1 bg-blue-50 text-blue-700 text-[10px] font-bold rounded-full uppercase tracking-widest border border-blue-100">Canonical</span>
                                                <span x-show="!h.id" class="px-3 py-1 bg-surface-container-low text-on-surface-variant text-[10px] font-bold rounded-full uppercase tracking-widest border border-outline-variant/30">Literal</span>
                                            </td>
                                            <td class="px-6 py-4 font-medium text-lg" x-text="h.count"></td>
                                            <td class="px-6 py-4">
                                                <div class="flex flex-col">
                                                    <span class="font-medium" :class="getDaysSince(h.dates[0]) > 180 ? 'text-error' : 'text-primary'" x-text="getDaysSince(h.dates[0]) === 0 ? 'Today' : `${getDaysSince(h.dates[0])} days ago` "></span>
                                                    <span class="text-[10px] text-on-surface-variant font-medium uppercase tracking-tighter" x-text="formatDate(h.dates[0])"></span>
                                                </div>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Bible Tab -->
                <div x-show="activeTab === 'bible'" x-transition class="h-full flex flex-col overflow-hidden">
                    <div class="flex-1 min-h-0 grid grid-cols-1 lg:grid-cols-4 gap-gutter overflow-hidden">
                        <!-- Filters Panel -->
                        <div class="lg:col-span-1 overflow-y-auto custom-scrollbar pr-2">
                            <div class="card p-6 space-y-6">
                                <h3 class="label-xs text-primary font-bold border-b border-outline-variant pb-2">Source Elements</h3>
                                <div class="space-y-3">
                                    <template x-for="(val, key) in bibleFilters">
                                        <label class="flex items-center gap-3 cursor-pointer group">
                                            <input type="checkbox" x-model="bibleFilters[key]" @change="fetchAndProcessData()" 
                                                class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary transition-all cursor-pointer" />
                                            <span class="text-sm font-medium text-on-surface-variant group-hover:text-primary transition-colors capitalize" x-text="key.replace(/([A-Z])/g, ' $1')"></span>
                                        </label>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <!-- Main Display Panel -->
                        <div class="lg:col-span-3 flex flex-col overflow-hidden h-full">
                            <div class="card h-full flex flex-col overflow-hidden">
                                <!-- Overview Header (Timeline) -->
                                <template x-if="!selectedBook">
                                    <div class="p-6 flex flex-col h-full overflow-hidden">
                                        <div class="mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 flex-none">
                                            <div class="space-y-1">
                                                <h3 class="font-headline text-2xl text-primary font-bold">Scripture Timeline</h3>
                                                <p class="text-[10px] text-on-surface-variant italic">Frequency by Book and Chapter. Click a book for verse-level detail.</p>
                                            </div>
                                            <div class="flex items-center gap-3 bg-surface-container-low px-4 py-2 rounded-lg border border-outline-variant/20">
                                                <span class="label-xs">Less</span>
                                                <div class="flex gap-[2px]">
                                                    <div class="w-3 h-3 rounded-[1px] bg-surface-container"></div>
                                                    <div class="w-3 h-3 rounded-[1px] bg-blue-100"></div>
                                                    <div class="w-3 h-3 rounded-[1px] bg-blue-400"></div>
                                                    <div class="w-3 h-3 rounded-[1px] bg-blue-700"></div>
                                                    <div class="w-3 h-3 rounded-[1px] bg-blue-900"></div>
                                                </div>
                                                <span class="label-xs">More</span>
                                            </div>
                                        </div>

                                        <!-- Jagged Timeline Grid -->
                                        <div class="flex-1 min-h-0 bg-surface-container-low/50 rounded-xl p-6 border border-outline-variant/20 overflow-y-auto custom-scrollbar">
                                            <div class="space-y-3">
                                                <template x-for="bookGroup in bibleStats.timeline" :key="bookGroup.book">
                                                    <div class="flex items-center gap-6 group cursor-pointer" @click="selectBook(bookGroup.book)">
                                                        <div class="w-32 shrink-0 text-right">
                                                            <span class="font-headline text-[10px] md:text-xs font-bold text-on-surface-variant group-hover:text-primary transition-colors truncate block" x-text="bookGroup.book"></span>
                                                        </div>
                                                        <div class="flex flex-wrap gap-[2px]">
                                                            <template x-for="ch in bookGroup.chapters" :key="ch.chapter">
                                                                <div 
                                                                    class="w-2 h-4 md:w-2.5 md:h-5 rounded-[1px] transition-all hover:scale-150 hover:z-10" 
                                                                    :class="getHeatColor(ch.count)"
                                                                    :title="`${bookGroup.book} ${ch.chapter} (${ch.count} uses)`">
                                                                </div>
                                                            </template>
                                                        </div>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </template>

                                <!-- Drill Down View -->
                                <template x-if="selectedBook">
                                    <div class="p-6 flex flex-col h-full overflow-hidden animate-in slide-in-from-right-4 duration-300">
                                        <div class="flex justify-between items-center border-b border-outline-variant pb-6 mb-6 flex-none">
                                            <div class="space-y-1">
                                                <div class="flex items-center gap-4">
                                                    <h2 class="font-headline text-3xl text-primary font-bold" x-text="selectedBook"></h2>
                                                    <span class="px-3 py-1 bg-primary text-on-primary text-[10px] font-bold rounded-full uppercase tracking-widest" x-text="`${drillDownData.chapters.length} Chapters`"></span>
                                                </div>
                                                <div class="label-xs text-primary/60">Verse-Level Saturation & Service History</div>
                                            </div>
                                            <button @click="selectedBook = null" class="flex items-center gap-2 px-4 py-2 text-primary hover:bg-primary/5 rounded-lg transition-all font-bold border border-primary/20 shadow-sm">
                                                <span class="material-symbols-outlined text-lg">arrow_back</span>
                                                <span>Back to Overview</span>
                                            </button>
                                        </div>
                                        
                                        <div class="flex-1 min-h-0 grid grid-cols-1 xl:grid-cols-3 gap-8 overflow-hidden">
                                            <!-- Verse Sub-Grid -->
                                            <div class="xl:col-span-2 flex flex-col overflow-hidden">
                                                <div class="flex items-center justify-between mb-3 flex-none">
                                                    <h4 class="label-xs text-primary font-bold">Scripture Density</h4>
                                                    <p class="text-[10px] text-on-surface-variant italic">Rows: Chapters | Columns: Verses</p>
                                                </div>
                                                <div class="flex-1 min-h-0 bg-surface-container-low/50 rounded-2xl p-6 border border-outline-variant/20 overflow-y-auto custom-scrollbar">
                                                    <div class="space-y-4">
                                                        <template x-for="ch in drillDownData.chapters" :key="ch.chapter">
                                                            <div class="flex items-start gap-4 group">
                                                                <div class="w-8 shrink-0 text-right pt-0.5">
                                                                    <span class="text-[10px] font-bold text-on-surface-variant group-hover:text-primary transition-colors" x-text="ch.chapter"></span>
                                                                </div>
                                                                <div class="flex flex-wrap gap-[2px]">
                                                                    <template x-for="v in ch.verses" :key="v.verse">
                                                                        <div 
                                                                            class="w-2.5 h-3.5 md:w-3 md:h-4 rounded-[1px] cursor-pointer transition-all hover:scale-150 hover:z-10 shadow-sm"
                                                                            :class="[
                                                                                getVerseHeatColor(v.count),
                                                                                selectedChapter === ch.chapter ? 'ring-1 ring-primary/30' : ''
                                                                            ]"
                                                                            :title="`Verse ${v.verse}: ${v.count} uses`"
                                                                            @click="selectChapter(ch.chapter)">
                                                                        </div>
                                                                    </template>
                                                                </div>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </div>
                                            </div>

                                            <!-- Citations Timeline -->
                                            <div class="xl:col-span-1 flex flex-col overflow-hidden border-l border-outline-variant/20 pl-4">
                                                <div class="flex items-center justify-between mb-3 flex-none">
                                                    <h4 class="label-xs text-primary font-bold">
                                                        Citations <span x-show="selectedChapter" x-text="` (Ch ${selectedChapter})`" class="text-on-surface-variant font-normal"></span>
                                                    </h4>
                                                    <span class="text-[10px] font-bold bg-primary/10 text-primary px-3 py-1 rounded-full uppercase tracking-tighter" x-text="`${currentCitations.length} Entries` font-bold"></span>
                                                </div>
                                                
                                                <div class="flex-1 min-h-0 overflow-y-auto custom-scrollbar pr-2 space-y-3">
                                                    <template x-for="svc in currentCitations" :key="svc.date + svc.element">
                                                        <div class="group bg-surface-container-low p-4 rounded-xl flex flex-col gap-3 hover:shadow-md transition-all border border-outline-variant/30">
                                                            <div class="flex justify-between items-start">
                                                                <div class="space-y-1">
                                                                    <div class="text-md font-bold text-primary tracking-tight leading-tight" x-text="svc.reference"></div>
                                                                    <div class="flex items-center gap-2">
                                                                        <span class="px-2 py-0.5 bg-primary/5 text-primary text-[8px] font-bold uppercase rounded border border-primary/10" x-text="svc.element"></span>
                                                                        <span class="text-[10px] text-on-surface-variant font-medium" x-text="formatDate(svc.date)"></span>
                                                                    </div>
                                                                </div>
                                                                <a :href="`service-builder.html?date=${svc.date}`" 
                                                                    class="p-2 bg-white text-primary rounded-lg border border-outline-variant hover:bg-primary hover:text-white hover:border-primary transition-all shadow-sm shrink-0">
                                                                    <span class="material-symbols-outlined text-sm">open_in_new</span>
                                                                </a>
                                                            </div>
                                                        </div>
                                                    </template>
                                                    <template x-if="currentCitations.length === 0">
                                                        <div class="flex flex-col items-center justify-center py-12 text-center space-y-3 opacity-50 bg-surface-container-low/30 rounded-2xl border border-dashed border-outline-variant">
                                                            <span class="material-symbols-outlined text-4xl">search_off</span>
                                                            <p class="text-xs font-medium italic">Click a chapter or verse to filter history.</p>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </main>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c5c6d0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #91949e; }
        
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slide-in-from-bottom-4 { from { transform: translateY(1rem); } to { transform: translateY(0); } }
        @keyframes zoom-in-95 { from { transform: scale(0.95); } to { transform: scale(1); } }
        
        .animate-in { animation: fade-in 0.5s ease-out forwards; }
        .fade-in { animation-name: fade-in; }
        .slide-in-from-bottom-4 { animation-name: slide-in-from-bottom-4; }
        .zoom-in-95 { animation-name: zoom-in-95; }
        .duration-300 { animation-duration: 300ms; }
        .duration-500 { animation-duration: 500ms; }
    </style>
</body>
</html>
