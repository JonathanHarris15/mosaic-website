<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Service Analytics | Mosaic Services</title>
    <!-- Google Fonts: Noto Serif & Work Sans -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-primary": "#b2c6f8", "surface-variant": "#e5e2dc", "on-primary": "#ffffff", "primary": "#001a43",
                        "on-primary-fixed-variant": "#314670", "on-tertiary-container": "#67a1b5", "on-secondary-fixed-variant": "#2b4969",
                        "surface-container-low": "#f6f3ed", "tertiary": "#001f28", "on-tertiary-fixed": "#001f28",
                        "secondary-container": "#b9d7fe", "secondary-fixed-dim": "#abc9ef", "surface": "#fcf9f3",
                        "outline-variant": "#c5c6d0", "primary-container": "#1a3059", "secondary": "#436082",
                        "on-secondary": "#ffffff", "on-surface": "#1c1c18", "primary-fixed": "#d8e2ff",
                        "surface-container-highest": "#e5e2dc", "on-primary-container": "#8499c8", "on-secondary-fixed": "#001d36",
                        "surface-dim": "#dcdad4", "on-secondary-container": "#415e7f", "on-surface-variant": "#44474e",
                        "tertiary-container": "#003643", "primary-fixed-dim": "#b2c6f8", "tertiary-fixed-dim": "#95cfe4",
                        "tertiary-fixed": "#b5ebff", "on-primary-fixed": "#001a42", "error": "#ba1a1a",
                        "surface-bright": "#fcf9f3", "on-background": "#1c1c18", "on-tertiary-fixed-variant": "#004e60",
                        "secondary-fixed": "#d1e4ff", "on-tertiary": "#ffffff", "on-error": "#ffffff",
                        "inverse-surface": "#31312d", "on-error-container": "#93000a", "outline": "#75777f",
                        "surface-container": "#f0eee8", "surface-container-high": "#ebe8e2", "inverse-on-surface": "#f3f0ea",
                        "surface-tint": "#4a5e8a", "surface-container-lowest": "#ffffff", "background": "#fcf9f3",
                        "error-container": "#ffdad6"
                    },
                    fontFamily: {
                        "headline-md": ["Noto Serif"], "display-lg": ["Noto Serif"], "label-md": ["Work Sans"],
                        "headline-lg": ["Noto Serif"], "body-lg": ["Work Sans"], "body-md": ["Work Sans"]
                    }
                }
            }
        }
    </script>
    <style>
        .heat-cell { width: 12px; height: 12px; border-radius: 2px; }
        .tab-active { border-bottom: 2px solid #001a43; color: #001a43; font-weight: 600; }
    </style>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-functions-compat.js"></script>
    
    <script src="auth.js"></script>
    <script src="bible-data.js"></script>
    <script type="module">
        import { analyticsPage } from './analytics.js';
        window.analyticsPage = analyticsPage;
    </script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body x-data="analyticsPage()" class="bg-background text-on-background font-body-md antialiased min-h-screen dark">
    <header class="w-full max-w-7xl mx-auto px-margin pt-md flex justify-between items-center">
        <a href="index.html" class="flex items-center gap-2 text-primary hover:opacity-80 transition-opacity">
            <span class="material-symbols-outlined">arrow_back</span>
            <span class="font-bold">Dashboard</span>
        </a>
        <div id="auth-container"></div>
    </header>

    <main class="max-w-7xl mx-auto px-margin py-lg">
        <div class="mb-lg">
            <h1 class="font-display-lg text-4xl text-primary mb-2">Service Analytics</h1>
            <p class="text-on-surface-variant">Historical insights into liturgical elements and scripture usage.</p>
        </div>

        <!-- Loading State -->
        <template x-if="loading">
            <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-xl text-center">
                <div class="mb-4 text-primary font-bold">Analyzing Historical Services...</div>
                <div class="w-full bg-surface-container rounded-full h-2.5 max-w-md mx-auto">
                    <div class="bg-primary h-2.5 rounded-full transition-all duration-300" :style="`width: ${progress}%`"></div>
                </div>
                <div class="mt-2 text-sm text-on-surface-variant" x-text="`${progress}% complete`"></div>
            </div>
        </template>

        <!-- Main Content -->
        <template x-if="!loading">
            <div class="space-y-md">
                <!-- Tabs -->
                <div class="flex border-b border-outline-variant">
                    <button @click="activeTab = 'hymns'" :class="activeTab === 'hymns' ? 'tab-active' : ''" class="px-6 py-3 text-on-surface-variant hover:text-primary transition-colors">Hymn Usage</button>
                    <button @click="activeTab = 'bible'" :class="activeTab === 'bible' ? 'tab-active' : ''" class="px-6 py-3 text-on-surface-variant hover:text-primary transition-colors">Bible Heat Map</button>
                </div>

                <!-- Hymn Tab -->
                <div x-show="activeTab === 'hymns'" class="space-y-md">
                    <div class="flex justify-between items-center bg-surface-container-lowest border border-outline-variant rounded-xl p-md">
                        <div class="relative w-full max-w-md">
                            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
                            <input type="text" x-model="hymnSearch" placeholder="Search hymns..." class="w-full pl-10 pr-4 py-2 bg-surface-container border-none rounded-lg focus:ring-2 focus:ring-primary" />
                        </div>
                    </div>

                    <div class="bg-surface-container-lowest border border-outline-variant rounded-xl overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-surface-container text-xs font-bold uppercase text-on-surface-variant">
                                <tr>
                                    <th class="px-6 py-4">Hymn Name</th>
                                    <th class="px-6 py-4">Status</th>
                                    <th class="px-6 py-4">Times Used</th>
                                    <th class="px-6 py-4">Last Used</th>
                                    <th class="px-6 py-4">Recency</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-outline-variant">
                                <template x-for="h in filteredHymns" :key="h.id || h.name">
                                    <tr class="hover:bg-surface-container-low transition-colors group">
                                        <td class="px-6 py-4">
                                            <div class="font-bold text-primary" x-text="h.name"></div>
                                        </td>
                                        <td class="px-6 py-4">
                                            <span x-show="h.id" class="px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded-full font-bold">Canonical</span>
                                            <span x-show="!h.id" class="px-2 py-1 bg-gray-100 text-gray-500 text-xs rounded-full font-bold">Literal</span>
                                        </td>
                                        <td class="px-6 py-4 font-medium" x-text="h.count"></td>
                                        <td class="px-6 py-4 text-on-surface-variant" x-text="formatDate(h.dates[0])"></td>
                                        <td class="px-6 py-4">
                                            <span class="text-sm" :class="getDaysSince(h.dates[0]) > 180 ? 'text-error' : 'text-on-surface-variant'" x-text="`${getDaysSince(h.dates[0])} days ago`"></span>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Bible Tab -->
                <div x-show="activeTab === 'bible'" class="space-y-md">
                    <div class="grid grid-cols-1 lg:grid-cols-4 gap-md">
                        <!-- Filters -->
                        <div class="lg:col-span-1 bg-surface-container-lowest border border-outline-variant rounded-xl p-md space-y-4">
                            <h3 class="font-bold text-primary uppercase text-xs tracking-widest">Source Elements</h3>
                            <div class="space-y-2">
                                <template x-for="(val, key) in bibleFilters">
                                    <label class="flex items-center gap-3 cursor-pointer group">
                                        <input type="checkbox" x-model="bibleFilters[key]" @change="fetchAndProcessData()" class="rounded border-outline text-primary focus:ring-primary" />
                                        <span class="text-sm text-on-surface-variant group-hover:text-primary capitalize" x-text="key.replace(/([A-Z])/g, ' $1')"></span>
                                    </label>
                                </template>
                            </div>
                        </div>

                        <!-- Heat Map Container -->
                        <div class="lg:col-span-3 bg-surface-container-lowest border border-outline-variant rounded-xl p-md">
                            <div class="mb-4 flex justify-between items-center">
                                <h3 class="font-bold text-primary">Scripture Timeline</h3>
                                <div class="flex items-center gap-2 text-xs text-on-surface-variant">
                                    <span>Less used</span>
                                    <div class="flex gap-1">
                                        <div class="w-3 h-3 bg-blue-50"></div>
                                        <div class="w-3 h-3 bg-blue-300"></div>
                                        <div class="w-3 h-3 bg-blue-600"></div>
                                        <div class="w-3 h-3 bg-blue-900"></div>
                                    </div>
                                    <span>More used</span>
                                </div>
                            </div>

                            <!-- Timeline Grid -->
                            <div class="flex flex-wrap gap-[2px] max-h-[500px] overflow-y-auto p-1 bg-surface-container-low rounded-lg">
                                <template x-for="t in bibleStats.timeline" :key="t.key">
                                    <div 
                                        class="heat-cell cursor-pointer transition-transform hover:scale-125"
                                        :class="getHeatColor(t.count)"
                                        :title="`${t.book} ${t.chapter} (${t.count} uses)`"
                                        @click="selectBook(t.book)">
                                    </div>
                                </template>
                            </div>
                            <div class="mt-4 text-[10px] text-on-surface-variant italic">Each square represents one chapter of the Bible. Click a square to view details for that book.</div>
                        </div>
                    </div>

                    <!-- Book Detail (Drill Down) -->
                    <template x-if="selectedBook">
                        <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md space-y-4">
                            <div class="flex justify-between items-center">
                                <h3 class="font-headline-md text-primary" x-text="selectedBook"></h3>
                                <button @click="selectedBook = null" class="text-on-surface-variant hover:text-primary flex items-center gap-1">
                                    <span class="material-symbols-outlined text-sm">close</span> Close Details
                                </button>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
                                <!-- Chapter Density -->
                                <div>
                                    <h4 class="text-xs font-bold uppercase text-on-surface-variant mb-3">Chapter Usage</h4>
                                    <div class="flex flex-wrap gap-2">
                                        <template x-for="ch in drillDownData" :key="ch.key">
                                            <div class="flex flex-col items-center gap-1">
                                                <button 
                                                    @click="selectChapter(ch.chapter)"
                                                    class="w-8 h-8 rounded flex items-center justify-center text-xs font-medium transition-all" 
                                                     :class="[
                                                        ch.count > 0 ? 'bg-primary text-on-primary' : 'bg-surface-container text-on-surface-variant',
                                                        selectedChapter === ch.chapter ? 'ring-2 ring-offset-2 ring-primary scale-110' : ''
                                                     ]"
                                                     x-text="ch.chapter"></button>
                                                <span class="text-[10px] text-on-surface-variant" x-text="ch.count"></span>
                                            </div>
                                        </template>
                                    </div>
                                </div>

                                <!-- Service List -->
                                <div>
                                    <h4 class="text-xs font-bold uppercase text-on-surface-variant mb-3">
                                        Citations <span x-show="selectedChapter" x-text="` (Chapter ${selectedChapter})`"></span>
                                    </h4>
                                    <div class="space-y-2 max-h-[300px] overflow-y-auto pr-2">
                                        <template x-for="svc in currentCitations" :key="svc.date + svc.element">
                                            <div class="bg-surface-container-low p-3 rounded-lg flex justify-between items-center">
                                                <div>
                                                    <div class="text-sm font-bold text-primary" x-text="svc.reference"></div>
                                                    <div class="text-[10px] text-on-surface-variant" x-text="`${svc.element} on ${formatDate(svc.date)}`"></div>
                                                </div>
                                                <a :href="`service-builder.html?date=${svc.date}`" class="text-primary hover:underline text-xs">View Service</a>
                                            </div>
                                        </template>
                                        <template x-if="currentCitations.length === 0">
                                            <p class="text-sm text-on-surface-variant italic">No citations found for this selection.</p>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </main>

</body>
</html>
