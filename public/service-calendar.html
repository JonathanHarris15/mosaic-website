<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Service Calendar - Mosaic Services</title>
    <!-- Google Fonts: Noto Serif & Work Sans -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&amp;family=Work+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Tailwind Config -->
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-primary": "#b2c6f8",
                        "surface-variant": "#e5e2dc",
                        "on-primary": "#ffffff",
                        "primary": "#001a43",
                        "on-primary-fixed-variant": "#314670",
                        "on-tertiary-container": "#67a1b5",
                        "on-secondary-fixed-variant": "#2b4969",
                        "surface-container-low": "#f6f3ed",
                        "tertiary": "#001f28",
                        "on-tertiary-fixed": "#001f28",
                        "secondary-container": "#b9d7fe",
                        "secondary-fixed-dim": "#abc9ef",
                        "surface": "#fcf9f3",
                        "outline-variant": "#c5c6d0",
                        "primary-container": "#1a3059",
                        "secondary": "#436082",
                        "on-secondary": "#ffffff",
                        "on-surface": "#1c1c18",
                        "primary-fixed": "#d8e2ff",
                        "surface-container-highest": "#e5e2dc",
                        "on-primary-container": "#8499c8",
                        "on-secondary-fixed": "#001d36",
                        "surface-dim": "#dcdad4",
                        "on-secondary-container": "#415e7f",
                        "on-surface-variant": "#44474e",
                        "tertiary-container": "#003643",
                        "primary-fixed-dim": "#b2c6f8",
                        "tertiary-fixed-dim": "#95cfe4",
                        "tertiary-fixed": "#b5ebff",
                        "on-primary-fixed": "#001a42",
                        "error": "#ba1a1a",
                        "surface-bright": "#fcf9f3",
                        "on-background": "#1c1c18",
                        "on-tertiary-fixed-variant": "#004e60",
                        "secondary-fixed": "#d1e4ff",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "inverse-surface": "#31312d",
                        "on-error-container": "#93000a",
                        "outline": "#75777f",
                        "surface-container": "#f0eee8",
                        "surface-container-high": "#ebe8e2",
                        "inverse-on-surface": "#f3f0ea",
                        "surface-tint": "#4a5e8a",
                        "surface-container-lowest": "#ffffff",
                        "background": "#fcf9f3",
                        "error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "base": "8px",
                        "md": "24px",
                        "xs": "4px",
                        "xl": "80px",
                        "margin": "32px",
                        "sm": "12px",
                        "lg": "48px"
                    },
                    "fontFamily": {
                        "headline-md": ["Noto Serif"],
                        "display-lg": ["Noto Serif"],
                        "label-md": ["Work Sans"],
                        "headline-lg": ["Noto Serif"],
                        "body-lg": ["Work Sans"],
                        "body-md": ["Work Sans"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #e5e2dc;
            /* surface-variant */
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #c5c6d0;
            /* outline-variant */
        }
    </style>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-functions-compat.js"></script>

    <script src="auth.js"></script>
</head>

<body
    class="bg-background text-on-background font-body-md text-body-md antialiased min-h-screen flex flex-col selection:bg-primary-fixed selection:text-on-primary-fixed dark">
    <header class="sticky top-0 z-50 bg-background/80 backdrop-blur-md border-b border-surface-variant/30">
        <div class="w-full max-w-7xl mx-auto px-margin py-md flex justify-between items-center">
            <a href="index.html" class="font-label-md text-label-md text-secondary hover:text-primary transition-colors flex items-center gap-1">
                <span class="material-symbols-outlined text-sm">arrow_back</span>
                Back to Portal
            </a>
            <div id="auth-container">
                <!-- Auth UI will be injected here by auth.js -->
                <div class="h-10"></div>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto px-margin pb-xl flex flex-col md:flex-row gap-margin pt-base">
        <!-- Sidebar Navigation -->
        <aside class="w-full md:w-64 flex-shrink-0">
            <div class="sticky top-[100px] bg-surface-container-lowest border border-outline-variant rounded-xl p-md">
                <h2 class="font-headline-md text-primary mb-sm flex items-center gap-2">
                    <span class="material-symbols-outlined">explore</span>
                    Directory
                </h2>
                <nav id="sidebar-nav" class="space-y-xs max-h-[calc(100vh-160px)] overflow-y-auto pr-2">
                    <!-- Nav links will be injected here -->
                </nav>
            </div>
        </aside>

        <!-- Calendar Container -->
        <div class="flex-grow">
            <!-- Header Section -->
            <div class="mb-lg">
                <h1 class="font-display-lg text-display-lg text-primary mb-xs">Service Calendar</h1>
            </div>

            <div id="calendar-container" class="space-y-lg">
                <!-- Years and Months will be injected here -->
                <div class="flex justify-center items-center py-xl">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="service-calendar.js"></script>
</body>

</html>
