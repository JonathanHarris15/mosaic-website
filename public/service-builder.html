<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Order of Service - Mosaic Services</title>
    <!-- Google Fonts: Noto Serif & Work Sans -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&amp;family=Work+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Alpine JS -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Tailwind Config -->
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#001a43",
                        "on-primary": "#ffffff",
                        "secondary": "#436082",
                        "on-secondary": "#ffffff",
                        "surface": "#fcf9f3",
                        "background": "#fcf9f3",
                        "outline-variant": "#c5c6d0",
                        "surface-container-low": "#f6f3ed",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#d8e2ff",
                        "on-primary-fixed": "#001a42"
                    },
                    "fontFamily": {
                        "headline-md": ["Noto Serif"],
                        "display-lg": ["Noto Serif"],
                        "label-md": ["Work Sans"],
                        "body-md": ["Work Sans"]
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        .form-section { @apply bg-white border border-outline-variant rounded-xl p-6 shadow-sm mb-4; }
        .field-label { @apply block font-label-md text-secondary uppercase tracking-wider text-xs mb-1.5; }
        .field-input { @apply w-full bg-surface-container-low border-outline-variant rounded-lg focus:ring-primary focus:border-primary font-body-md transition-all; }
        .hymn-search-container { @apply relative mt-2; }
    </style>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>
</head>

<body
    class="bg-background text-on-background font-body-md text-body-md antialiased min-h-screen flex flex-col dark"
    x-data="serviceForm()" x-init="init()" x-cloak>
    
    <header class="sticky top-0 z-50 bg-background/80 backdrop-blur-md border-b border-surface-variant/30">
        <div class="w-full max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="service-calendar.html" class="font-label-md text-label-md text-secondary hover:text-primary transition-colors flex items-center gap-1">
                <span class="material-symbols-outlined text-sm">arrow_back</span>
                Back to Calendar
            </a>
            <div class="flex items-center gap-4">
                <button @click="save()" :disabled="saving"
                    class="bg-primary text-on-primary px-6 py-2 rounded-full font-label-md text-label-md hover:bg-opacity-90 transition-all flex items-center gap-2 disabled:opacity-50">
                    <span class="material-symbols-outlined text-[20px]" x-show="!saving">save</span>
                    <span class="animate-spin material-symbols-outlined text-[20px]" x-show="saving">sync</span>
                    <span x-text="saving ? 'Saving...' : 'Save Service'"></span>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-3xl w-full mx-auto px-6 py-8">
        <div class="mb-8">
            <h1 class="font-display-lg text-4xl text-primary mb-2" x-text="formatDate(date)"></h1>
            <div class="flex items-center gap-4">
                <label class="flex items-center gap-2 cursor-pointer group">
                    <input type="checkbox" x-model="service.hasBaptism" class="rounded border-outline-variant text-primary focus:ring-primary">
                    <span class="font-label-md text-secondary group-hover:text-primary transition-colors">Include Baptism?</span>
                </label>
            </div>
        </div>

        <!-- Metadata Section -->
        <div class="form-section">
            <h2 class="font-headline-md text-xl text-primary mb-4 border-b pb-2">Service Overview</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2">
                    <label class="field-label">Service Theme</label>
                    <input type="text" x-model="service.theme" class="field-input" placeholder="e.g. The Worker of Justice">
                </div>
                <div class="md:col-span-2">
                    <label class="field-label">Key Verse</label>
                    <input type="text" x-model="service.keyVerse" class="field-input" placeholder="e.g. Galatians 3:5-11">
                </div>
                <div>
                    <label class="field-label">Service Leader</label>
                    <input type="text" x-model="service.serviceLeader" class="field-input">
                </div>
                <div>
                    <label class="field-label">Music Leader</label>
                    <input type="text" x-model="service.musicLeader" class="field-input">
                </div>
                <div>
                    <label class="field-label">Preacher</label>
                    <input type="text" x-model="service.preacher" class="field-input">
                </div>
            </div>
        </div>

        <!-- Liturgy Form -->
        <div class="space-y-4">
            <h2 class="font-headline-md text-2xl text-primary px-2">Liturgy Flow</h2>
            
            <!-- Preparation -->
            <div class="form-section">
                <h3 class="font-label-md text-secondary tracking-widest uppercase text-xs mb-4">I. Preparation</h3>
                <div class="space-y-4">
                    <div>
                        <label class="field-label">Call to Worship</label>
                        <input type="text" x-model="service.liturgy.callToWorship" class="field-input" placeholder="Psalm reference...">
                    </div>
                    <div>
                        <label class="field-label">Opening Hymn</label>
                        <div x-data="hymnPicker(service.liturgy.hymn1)">
                            <div class="flex items-center bg-surface-container-low rounded-lg border border-outline-variant px-3 py-2">
                                <span class="material-symbols-outlined text-[18px] text-outline mr-2">music_note</span>
                                <input type="text" placeholder="Search hymns..." x-model="query" @focus="open = true" @input.debounce="search()" class="bg-transparent border-none p-0 w-full focus:ring-0 text-sm">
                            </div>
                            <div x-show="open && results.length > 0" @click.away="open = false" class="absolute z-10 w-full mt-1 bg-white border border-outline-variant rounded-lg shadow-xl max-h-48 overflow-y-auto">
                                <template x-for="h in results" :key="h.id">
                                    <button @click="select(h); open = false" class="w-full text-left px-4 py-2 hover:bg-primary-fixed transition-colors border-b last:border-0">
                                        <p class="font-label-md text-sm" x-text="h.hymn_name"></p>
                                        <p class="text-[10px] text-secondary" x-text="h.lyrics_writer"></p>
                                    </button>
                                </template>
                            </div>
                            <div x-show="service.liturgy.hymn1.name" class="mt-2 flex items-center gap-2 text-primary bg-primary-fixed/30 px-3 py-1.5 rounded-lg border border-primary-fixed/50">
                                <span class="font-label-md text-xs" x-text="service.liturgy.hymn1.name"></span>
                                <button @click="clear()"><span class="material-symbols-outlined text-sm">close</span></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Word -->
            <div class="form-section">
                <h3 class="font-label-md text-secondary tracking-widest uppercase text-xs mb-4">II. The Word</h3>
                <div class="space-y-4">
                    <div>
                        <label class="field-label">Confession & Assurance</label>
                        <input type="text" x-model="service.liturgy.confession" class="field-input" placeholder="Scripture reference...">
                    </div>
                    <div>
                        <label class="field-label">Second Hymn</label>
                        <div x-data="hymnPicker(service.liturgy.hymn2)">
                            <div class="flex items-center bg-surface-container-low rounded-lg border border-outline-variant px-3 py-2">
                                <span class="material-symbols-outlined text-[18px] text-outline mr-2">music_note</span>
                                <input type="text" placeholder="Search hymns..." x-model="query" @focus="open = true" @input.debounce="search()" class="bg-transparent border-none p-0 w-full focus:ring-0 text-sm">
                            </div>
                            <div x-show="open && results.length > 0" @click.away="open = false" class="absolute z-10 w-full mt-1 bg-white border border-outline-variant rounded-lg shadow-xl max-h-48 overflow-y-auto">
                                <template x-for="h in results" :key="h.id">
                                    <button @click="select(h); open = false" class="w-full text-left px-4 py-2 hover:bg-primary-fixed transition-colors border-b last:border-0">
                                        <p class="font-label-md text-sm" x-text="h.hymn_name"></p>
                                        <p class="text-[10px] text-secondary" x-text="h.lyrics_writer"></p>
                                    </button>
                                </template>
                            </div>
                            <div x-show="service.liturgy.hymn2.name" class="mt-2 flex items-center gap-2 text-primary bg-primary-fixed/30 px-3 py-1.5 rounded-lg border border-primary-fixed/50">
                                <span class="font-label-md text-xs" x-text="service.liturgy.hymn2.name"></span>
                                <button @click="clear()"><span class="material-symbols-outlined text-sm">close</span></button>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="field-label">Scripture Reading</label>
                        <input type="text" x-model="service.liturgy.scriptureReading" class="field-input" placeholder="Galatians 5:1...">
                    </div>
                    <div>
                        <label class="field-label">Sermon Passage</label>
                        <input type="text" x-model="service.liturgy.sermonPassage" class="field-input" placeholder="Galatians 2:15-16...">
                    </div>
                </div>
            </div>

            <!-- Baptism (Conditional) -->
            <div x-show="service.hasBaptism" x-transition class="form-section border-primary bg-primary-fixed/10">
                <div class="flex items-center gap-2 mb-4">
                    <span class="material-symbols-outlined text-primary">water_drop</span>
                    <h3 class="font-label-md text-primary tracking-widest uppercase text-xs">Baptismal Liturgy</h3>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="field-label">Candidate Name(s)</label>
                        <input type="text" x-model="service.liturgy.baptismNames" class="field-input">
                    </div>
                    <div>
                        <label class="field-label">Baptism Scripture/Notes</label>
                        <textarea x-model="service.liturgy.baptismNotes" class="field-input" rows="2"></textarea>
                    </div>
                </div>
            </div>

            <!-- Response -->
            <div class="form-section">
                <h3 class="font-label-md text-secondary tracking-widest uppercase text-xs mb-4">III. Response</h3>
                <div class="space-y-4">
                    <div>
                        <label class="field-label">Closing Hymn</label>
                        <div x-data="hymnPicker(service.liturgy.hymn3)">
                            <div class="flex items-center bg-surface-container-low rounded-lg border border-outline-variant px-3 py-2">
                                <span class="material-symbols-outlined text-[18px] text-outline mr-2">music_note</span>
                                <input type="text" placeholder="Search hymns..." x-model="query" @focus="open = true" @input.debounce="search()" class="bg-transparent border-none p-0 w-full focus:ring-0 text-sm">
                            </div>
                            <div x-show="open && results.length > 0" @click.away="open = false" class="absolute z-10 w-full mt-1 bg-white border border-outline-variant rounded-lg shadow-xl max-h-48 overflow-y-auto">
                                <template x-for="h in results" :key="h.id">
                                    <button @click="select(h); open = false" class="w-full text-left px-4 py-2 hover:bg-primary-fixed transition-colors border-b last:border-0">
                                        <p class="font-label-md text-sm" x-text="h.hymn_name"></p>
                                        <p class="text-[10px] text-secondary" x-text="h.lyrics_writer"></p>
                                    </button>
                                </template>
                            </div>
                            <div x-show="service.liturgy.hymn3.name" class="mt-2 flex items-center gap-2 text-primary bg-primary-fixed/30 px-3 py-1.5 rounded-lg border border-primary-fixed/50">
                                <span class="font-label-md text-xs" x-text="service.liturgy.hymn3.name"></span>
                                <button @click="clear()"><span class="material-symbols-outlined text-sm">close</span></button>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="field-label">Benediction</label>
                        <input type="text" x-model="service.liturgy.benediction" class="field-input" placeholder="Romans 3:26...">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="service-builder.js"></script>
</body>

</html>
