<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Order of Service Builder - Mosaic Services</title>
    <!-- Google Fonts: Noto Serif & Work Sans -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&amp;family=Work+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Alpine JS -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Tailwind Config -->
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-primary": "#b2c6f8",
                        "surface-variant": "#e5e2dc",
                        "on-primary": "#ffffff",
                        "primary": "#001a43",
                        "on-primary-fixed-variant": "#314670",
                        "on-tertiary-container": "#67a1b5",
                        "on-secondary-fixed-variant": "#2b4969",
                        "surface-container-low": "#f6f3ed",
                        "tertiary": "#001f28",
                        "on-tertiary-fixed": "#001f28",
                        "secondary-container": "#b9d7fe",
                        "secondary-fixed-dim": "#abc9ef",
                        "surface": "#fcf9f3",
                        "outline-variant": "#c5c6d0",
                        "primary-container": "#1a3059",
                        "secondary": "#436082",
                        "on-secondary": "#ffffff",
                        "on-surface": "#1c1c18",
                        "primary-fixed": "#d8e2ff",
                        "surface-container-highest": "#e5e2dc",
                        "on-primary-container": "#8499c8",
                        "on-secondary-fixed": "#001d36",
                        "surface-dim": "#dcdad4",
                        "on-secondary-container": "#415e7f",
                        "on-surface-variant": "#44474e",
                        "tertiary-container": "#003643",
                        "primary-fixed-dim": "#b2c6f8",
                        "tertiary-fixed-dim": "#95cfe4",
                        "tertiary-fixed": "#b5ebff",
                        "on-primary-fixed": "#001a42",
                        "error": "#ba1a1a",
                        "surface-bright": "#fcf9f3",
                        "on-background": "#1c1c18",
                        "on-tertiary-fixed-variant": "#004e60",
                        "secondary-fixed": "#d1e4ff",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "inverse-surface": "#31312d",
                        "on-error-container": "#93000a",
                        "outline": "#75777f",
                        "surface-container": "#f0eee8",
                        "surface-container-high": "#ebe8e2",
                        "inverse-on-surface": "#f3f0ea",
                        "surface-tint": "#4a5e8a",
                        "surface-container-lowest": "#ffffff",
                        "background": "#fcf9f3",
                        "error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "base": "8px",
                        "md": "24px",
                        "xs": "4px",
                        "xl": "80px",
                        "margin": "32px",
                        "sm": "12px",
                        "lg": "48px"
                    },
                    "fontFamily": {
                        "headline-md": ["Noto Serif"],
                        "display-lg": ["Noto Serif"],
                        "label-md": ["Work Sans"],
                        "headline-lg": ["Noto Serif"],
                        "body-lg": ["Work Sans"],
                        "body-md": ["Work Sans"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #e5e2dc;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #c5c6d0;
        }

        [x-cloak] { display: none !important; }
    </style>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-functions-compat.js"></script>

    <script src="auth.js"></script>
</head>

<body
    class="bg-background text-on-background font-body-md text-body-md antialiased min-h-screen flex flex-col selection:bg-primary-fixed selection:text-on-primary-fixed dark"
    x-data="serviceBuilder()" x-init="init()" x-cloak>
    
    <header class="sticky top-0 z-50 bg-background/80 backdrop-blur-md border-b border-surface-variant/30">
        <div class="w-full max-w-7xl mx-auto px-margin py-md flex justify-between items-center">
            <a href="service-calendar.html" class="font-label-md text-label-md text-secondary hover:text-primary transition-colors flex items-center gap-1">
                <span class="material-symbols-outlined text-sm">arrow_back</span>
                Back to Calendar
            </a>
            <div class="flex items-center gap-4">
                <button @click="saveService()" :disabled="saving"
                    class="bg-primary text-on-primary px-6 py-2 rounded-full font-label-md text-label-md hover:bg-primary-container transition-all flex items-center gap-2 disabled:opacity-50">
                    <span class="material-symbols-outlined text-[20px]" x-show="!saving">save</span>
                    <span class="animate-spin material-symbols-outlined text-[20px]" x-show="saving">sync</span>
                    <span x-text="saving ? 'Saving...' : 'Save Order of Service'"></span>
                </button>
                <div id="auth-container"></div>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-4xl w-full mx-auto px-margin pb-xl flex flex-col gap-lg pt-lg">
        <!-- Header Info -->
        <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg space-y-md shadow-sm">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-md">
                <h1 class="font-display-lg text-headline-lg text-primary" x-text="'Service Builder: ' + formatDate(date)"></h1>
                <span class="px-4 py-1 bg-secondary-container text-on-secondary-container rounded-full font-label-md text-label-md" x-text="status"></span>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-md pt-base">
                <div class="space-y-xs">
                    <label class="font-label-md text-label-md text-secondary uppercase tracking-wider">Service Theme</label>
                    <input type="text" x-model="service.theme" placeholder="e.g. The Worker of Justice"
                        class="w-full bg-surface-container-low border-outline-variant rounded-lg focus:ring-primary focus:border-primary font-body-md">
                </div>
                <div class="space-y-xs">
                    <label class="font-label-md text-label-md text-secondary uppercase tracking-wider">Key Verse</label>
                    <input type="text" x-model="service.keyVerse" placeholder="e.g. Galatians 3:5-11"
                        class="w-full bg-surface-container-low border-outline-variant rounded-lg focus:ring-primary focus:border-primary font-body-md">
                </div>
                <div class="space-y-xs">
                    <label class="font-label-md text-label-md text-secondary uppercase tracking-wider">Service Leader</label>
                    <input type="text" x-model="service.serviceLeader" placeholder="Name"
                        class="w-full bg-surface-container-low border-outline-variant rounded-lg focus:ring-primary focus:border-primary font-body-md">
                </div>
                <div class="space-y-xs">
                    <label class="font-label-md text-label-md text-secondary uppercase tracking-wider">Music Leader</label>
                    <input type="text" x-model="service.musicLeader" placeholder="Name"
                        class="w-full bg-surface-container-low border-outline-variant rounded-lg focus:ring-primary focus:border-primary font-body-md">
                </div>
                <div class="space-y-xs">
                    <label class="font-label-md text-label-md text-secondary uppercase tracking-wider">Preacher</label>
                    <input type="text" x-model="service.preacher" placeholder="Name"
                        class="w-full bg-surface-container-low border-outline-variant rounded-lg focus:ring-primary focus:border-primary font-body-md">
                </div>
            </div>
        </div>

        <!-- Service Elements -->
        <div class="space-y-sm">
            <h2 class="font-headline-md text-primary flex items-center gap-2 px-base">
                <span class="material-symbols-outlined">reorder</span>
                Liturgy Elements
            </h2>
            
            <div class="space-y-xs">
                <template x-for="(element, index) in service.elements" :key="element.id">
                    <div class="group bg-surface-container-lowest border border-outline-variant rounded-xl p-md flex flex-col gap-sm hover:shadow-md transition-all">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-md">
                                <div class="flex flex-col gap-0.5 opacity-20 group-hover:opacity-100 transition-opacity cursor-grab">
                                    <span class="material-symbols-outlined text-sm">drag_handle</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <select x-model="element.type" @change="handleTypeChange(element)"
                                        class="bg-transparent border-none p-0 font-label-md text-label-md text-secondary focus:ring-0 uppercase tracking-widest cursor-pointer hover:text-primary transition-colors">
                                        <option value="heading">Heading</option>
                                        <option value="hymn">Hymn</option>
                                        <option value="scripture">Scripture</option>
                                        <option value="prayer">Prayer</option>
                                        <option value="sermon">Sermon</option>
                                        <option value="custom">Custom</option>
                                    </select>
                                    <span class="text-outline-variant">•</span>
                                    <input type="text" x-model="element.title"
                                        class="bg-transparent border-none p-0 font-headline-md text-on-surface focus:ring-0 placeholder:text-outline-variant"
                                        placeholder="Element Title">
                                </div>
                            </div>
                            
                            <div class="flex items-center gap-2">
                                <button @click="moveElement(index, -1)" :disabled="index === 0" class="text-outline hover:text-primary disabled:opacity-20">
                                    <span class="material-symbols-outlined">expand_less</span>
                                </button>
                                <button @click="moveElement(index, 1)" :disabled="index === service.elements.length - 1" class="text-outline hover:text-primary disabled:opacity-20">
                                    <span class="material-symbols-outlined">expand_more</span>
                                </button>
                                <button @click="removeElement(index)" class="text-outline hover:text-error transition-colors ml-base">
                                    <span class="material-symbols-outlined">delete</span>
                                </button>
                            </div>
                        </div>

                        <!-- Element Body -->
                        <div class="ml-10">
                            <!-- Hymn Type: Search & Info -->
                            <template x-if="element.type === 'hymn'">
                                <div class="space-y-sm" x-data="{ open: false, query: '' }">
                                    <div class="relative">
                                        <div class="flex items-center bg-surface-container-low rounded-lg border border-outline-variant px-md py-1.5 focus-within:border-primary transition-all">
                                            <span class="material-symbols-outlined text-[18px] text-outline mr-sm">search</span>
                                            <input type="text" placeholder="Search hymns..." x-model="query" 
                                                @focus="open = true" @input.debounce="searchHymns(query, element)"
                                                class="bg-transparent border-none p-0 w-full focus:ring-0 text-body-md">
                                        </div>
                                        
                                        <div x-show="open && hymnsResults.length > 0" @click.away="open = false"
                                            class="absolute z-20 w-full mt-1 bg-surface-container-highest border border-outline-variant rounded-lg shadow-xl max-h-48 overflow-y-auto">
                                            <template x-for="h in hymnsResults" :key="h.id">
                                                <button @click="selectHymn(element, h); open = false"
                                                    class="w-full text-left px-md py-2 hover:bg-primary-fixed transition-colors flex justify-between items-center border-b border-outline-variant last:border-0">
                                                    <div>
                                                        <p class="font-label-md text-on-surface" x-text="h.hymn_name"></p>
                                                        <p class="text-xs text-on-surface-variant" x-text="h.lyrics_writer"></p>
                                                    </div>
                                                    <span class="material-symbols-outlined text-[18px] text-primary">add</span>
                                                </button>
                                            </template>
                                        </div>
                                    </div>
                                    
                                    <template x-if="element.hymnData">
                                        <div class="flex items-center gap-2 bg-primary-fixed/30 p-sm rounded-lg border border-primary-fixed/50">
                                            <span class="material-symbols-outlined text-primary text-[20px]">music_note</span>
                                            <span class="font-label-md text-primary" x-text="element.hymnData.hymn_name"></span>
                                            <span class="text-on-surface-variant text-xs" x-text="'by ' + element.hymnData.lyrics_writer"></span>
                                        </div>
                                    </template>
                                </div>
                            </template>

                            <!-- Other Types: Textarea -->
                            <template x-if="element.type !== 'hymn' && element.type !== 'heading'">
                                <textarea x-model="element.content" rows="2"
                                    class="w-full bg-surface-container-low border border-outline-variant rounded-lg focus:ring-primary focus:border-primary font-body-md text-sm p-md"
                                    placeholder="Enter details or notes..."></textarea>
                            </template>
                        </div>
                    </div>
                </template>
            </div>

            <div class="flex justify-center pt-md">
                <button @click="addElement()"
                    class="group border-2 border-dashed border-outline-variant hover:border-primary hover:bg-primary-fixed/20 rounded-xl px-12 py-4 transition-all flex flex-col items-center gap-2 text-outline-variant hover:text-primary">
                    <span class="material-symbols-outlined text-[32px]">add_circle</span>
                    <span class="font-label-md text-label-md uppercase tracking-widest">Add Service Element</span>
                </button>
            </div>
        </div>
    </main>

    <script src="service-builder.js"></script>
</body>

</html>
