<body
    class="bg-background text-on-background font-body-md text-body-md antialiased min-h-screen md:h-screen overflow-x-hidden md:overflow-hidden flex flex-col selection:bg-primary-fixed selection:text-on-primary-fixed">
    <header class="w-full max-w-7xl mx-auto px-4 md:px-margin pt-2 md:pt-md flex justify-end" id="auth-container">
        <!-- Auth UI will be injected here by auth.js -->
        <div class="h-10"></div> <!-- Placeholder to prevent layout shift -->
    </header>
    <main class="flex-grow max-w-7xl w-full mx-auto px-margin pb-md flex flex-col gap-margin pt-base md:min-h-0 md:overflow-hidden">
        <!-- Logo -->
        <div class="w-full flex justify-center py-sm shrink-0">
            <img alt="Mosaic Liturgy Logo" class="h-24 w-24 object-contain"
                src="assets/mosaic-logo.png" />
        </div>

        <div class="grid grid-cols-1 md:grid-cols-12 md:grid-rows-1 gap-margin flex-grow min-h-0">
            <!-- Left Column -->
            <div class="md:col-span-8 flex flex-col gap-margin md:min-h-0 md:overflow-hidden">
                <div
                    class="bg-surface-container-lowest rounded-xl border border-outline-variant py-sm px-lg flex flex-row items-center justify-between gap-md relative overflow-hidden shrink-0">
                    <div class="relative z-10">
                        <h1 class="font-display-lg text-headline-lg text-primary mb-0" id="greeting">Good Morning</h1>
                    </div>
                    <p class="font-body-md text-body-md text-on-surface-variant hidden items-center gap-xs relative z-10" id="upcoming-box">
                        <span class="material-symbols-outlined text-[20px]">schedule</span>
                        <span id="upcoming-text"></span>
                    </p>

                    <div
                        class="absolute -right-12 -top-16 w-40 h-40 border-[1px] border-outline-variant rounded-full opacity-20 pointer-events-none">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-md content-start md:flex-1 md:min-h-0 md:overflow-y-auto md:pr-1 md:pb-1" id="nav-cards-grid">
                    <!-- Hymn Directory Button -->
                    <a href="hymn-directory.html" data-card-key="hymn-directory"
                        class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg flex flex-col items-center justify-center text-center cursor-pointer group hover:shadow-[0_4px_16px_rgba(4,22,46,0.05)] transition-shadow duration-300">
                        <div
                            class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-sm group-hover:bg-primary-fixed transition-colors duration-300">
                            <span class="material-symbols-outlined text-[32px] text-primary"
                                style='font-variation-settings: "FILL" 1;'>menu_book</span>
                        </div>
                        <h2 class="font-headline-md text-headline-md text-on-surface mb-base">Hymn Directory</h2>
                        <p class="font-body-md text-body-md text-on-surface-variant">Browse &amp; download musical
                            selections.</p>
                    </a>

                    <!-- Service Calendar -->
                    <a href="service-calendar.html" data-card-key="service-calendar"
                        class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg flex flex-col items-center justify-center text-center cursor-pointer group hover:shadow-[0_4px_16px_rgba(4,22,46,0.05)] transition-shadow duration-300">
                        <div
                            class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-sm group-hover:bg-primary-fixed transition-colors duration-300">
                            <span class="material-symbols-outlined text-[32px] text-primary"
                                style='font-variation-settings: "FILL" 1;'>calendar_month</span>
                        </div>
                        <h2 class="font-headline-md text-headline-md text-on-surface mb-base">Service Calendar</h2>
                        <p class="font-body-md text-body-md text-on-surface-variant">View upcoming and past service dates.</p>
                    </a>

                    <!-- Service Analytics -->
                    <a href="analytics.html" data-card-key="service-analytics"
                        class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg flex flex-col items-center justify-center text-center cursor-pointer group hover:shadow-[0_4px_16px_rgba(4,22,46,0.05)] transition-shadow duration-300">
                        <div
                            class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-sm group-hover:bg-primary-fixed transition-colors duration-300">
                            <span class="material-symbols-outlined text-[32px] text-primary"
                                style='font-variation-settings: "FILL" 1;'>monitoring</span>
                        </div>
                        <h2 class="font-headline-md text-headline-md text-on-surface mb-base">Service Analytics</h2>
                        <p class="font-body-md text-body-md text-on-surface-variant">Insights into historical services.</p>
                    </a>
                </div>
            </div>

            <!-- Right Column -->
            <div class="md:col-span-4 flex flex-col md:min-h-0 md:overflow-hidden">
                <div
                    class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md flex-grow flex flex-col md:overflow-hidden" id="sunday-glance">
                    <h2 class="font-headline-md text-headline-md text-primary pb-xs border-b border-surface-variant mb-md flex-shrink-0">
                        Sunday at a Glance</h2>
                    <div id="glance-content" class="flex-grow overflow-y-auto flex flex-col gap-sm pr-1">
                        <!-- Data will be injected here -->
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        function getGreeting() {
            const hour = new Date().getHours();
            if (hour >= 5 && hour < 12) return "Good morning";
            if (hour >= 12 && hour < 17) return "Good afternoon";
            if (hour >= 17 && hour < 21) return "Good evening";
            return "Good night";
        }

        // ---- Dashboard card reordering -------------------------------------
        // Each feature card carries a stable data-card-key. The user's preferred
        // order is stored on /users/{uid}.dashboardCardOrder as an array of those
        // keys. Cards not present in the saved order (e.g. unlocked by a role
        // promotion) are appended to the end so they're never lost.

        function applyDashboardOrder(grid, savedOrder) {
            if (!grid) return;
            const cards = Array.from(grid.children).filter(c => c.dataset.cardKey);
            const order = Array.isArray(savedOrder) ? savedOrder : [];
            // Cards listed in the saved order, in that order...
            const ordered = order
                .map(key => cards.find(c => c.dataset.cardKey === key))
                .filter(Boolean);
            const placed = new Set(ordered.map(c => c.dataset.cardKey));
            // ...followed by any remaining cards in their current (default) order.
            const remaining = cards.filter(c => !placed.has(c.dataset.cardKey));
            [...ordered, ...remaining].forEach(c => grid.appendChild(c));
        }

        function decorateCardsWithHandles(grid) {
            Array.from(grid.children).forEach(card => {
                if (!card.dataset.cardKey || card.querySelector('.drag-handle')) return;
                // The handle is positioned absolutely within the card.
                card.classList.add('relative');
                // The cards are <a> elements, which the browser tries to drag
                // natively (dragging the link/URL). Disable that so SortableJS's
                // fallback drag of the whole card is the only thing that runs.
                card.setAttribute('draggable', 'false');
                card.addEventListener('dragstart', e => e.preventDefault());
                const handle = document.createElement('button');
                handle.type = 'button';
                handle.className = 'drag-handle absolute top-2 right-2 p-1 rounded-md text-on-surface-variant opacity-0 group-hover:opacity-60 hover:!opacity-100 hover:bg-surface-container transition-all duration-200 cursor-grab active:cursor-grabbing touch-none';
                handle.title = 'Drag to reorder';
                handle.setAttribute('aria-label', 'Drag to reorder this card');
                handle.innerHTML = '<span class="material-symbols-outlined text-[20px] pointer-events-none">drag_indicator</span>';
                // The card is an <a>; keep a click on the handle from navigating.
                handle.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); });
                card.appendChild(handle);
            });
        }

        async function saveDashboardOrder(uid, grid) {
            const order = Array.from(grid.children)
                .map(c => c.dataset.cardKey)
                .filter(Boolean);
            try {
                await db.collection('users').doc(uid).set({ dashboardCardOrder: order }, { merge: true });
            } catch (e) {
                console.error('Failed to save dashboard card order:', e);
            }
        }

        function setupCardReordering(uid, grid) {
            if (!grid) return;
            decorateCardsWithHandles(grid);
            if (typeof Sortable === 'undefined' || grid._sortable) return;
            grid._sortable = Sortable.create(grid, {
                handle: '.drag-handle',
                animation: 150,
                // Anchors are natively draggable; the fallback path drives the
                // drag from mouse/touch events instead and avoids that conflict.
                forceFallback: true,
                ghostClass: 'opacity-40',
                onEnd: () => saveDashboardOrder(uid, grid)
            });
        }

        async function updateDashboard() {
            const greetingEl = document.getElementById('greeting');
            const upcomingBox = document.getElementById('upcoming-box');
            const upcomingText = document.getElementById('upcoming-text');
            const glanceContent = document.getElementById('glance-content');

            if (!greetingEl || !upcomingBox || !upcomingText || !glanceContent) {
                console.warn("Dashboard elements not found, retrying...");
                setTimeout(updateDashboard, 100);
                return;
            }
            
            // 1. Set Time-based Greeting
            const baseGreeting = getGreeting();
            greetingEl.textContent = baseGreeting;

            // 2. Handle User Auth and Role
            const user = await new Promise(resolve => {
                const unsubscribe = auth.onAuthStateChanged(u => {
                    unsubscribe();
                    resolve(u);
                });
            });

            let userRole = 'viewer';
            let savedCardOrder = null;
            if (user) {
                let name = 'Friend';
                try {
                    const userData = await getUserData(user.uid);
                    if (userData) {
                        userRole = userData.role || 'viewer';
                        savedCardOrder = Array.isArray(userData.dashboardCardOrder) ? userData.dashboardCardOrder : null;
                        if (userData.email) {
                            name = userData.email.split('@')[0];
                            name = name.charAt(0).toUpperCase() + name.slice(1);
                        }
                        // Prefer the linked directory person's first name, if one is linked.
                        if (userData.personId) {
                            try {
                                const personDoc = await db.collection('people').doc(userData.personId).get();
                                const personName = personDoc.exists ? (personDoc.data().name || '').trim() : '';
                                if (personName) {
                                    name = personName.split(/\s+/)[0];
                                }
                            } catch (pe) {
                                console.error("Error fetching linked person:", pe);
                            }
                        }
                    }
                } catch (e) {
                    console.error("Error fetching user data:", e);
                }
                greetingEl.textContent = `${baseGreeting}, ${name}`;

                const cardClass = 'bg-surface-container-lowest border border-outline-variant rounded-xl p-lg flex flex-col items-center justify-center text-center cursor-pointer group hover:shadow-[0_4px_16px_rgba(4,22,46,0.05)] transition-shadow duration-300';
                const grid = document.getElementById('nav-cards-grid');

                // People's Directory — members and above (members get a read-only view)
                if (grid && !document.getElementById('directory-card') &&
                    ['member', 'editor', 'elder', 'admin', 'super_admin'].includes(userRole)) {
                    const dirCard = document.createElement('a');
                    dirCard.id = 'directory-card';
                    dirCard.dataset.cardKey = 'directory';
                    dirCard.href = 'peoples-page.html';
                    dirCard.className = cardClass;
                    dirCard.innerHTML = `
                        <div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-sm group-hover:bg-primary-fixed transition-colors duration-300">
                            <span class="material-symbols-outlined text-[32px] text-primary" style='font-variation-settings: "FILL" 1;'>groups</span>
                        </div>
                        <h2 class="font-headline-md text-headline-md text-on-surface mb-base">People's Directory</h2>
                        <p class="font-body-md text-body-md text-on-surface-variant">Browse the church directory.</p>
                    `;
                    // Place it right after the Hymn Directory card
                    grid.insertBefore(dirCard, grid.children[1] || null);
                }

                // Hymn Manager — editors and above (manage the hymn catalog)
                if (grid && !document.getElementById('hymn-manager-card') &&
                    ['editor', 'elder', 'admin', 'super_admin'].includes(userRole)) {
                    const card = document.createElement('a');
                    card.id = 'hymn-manager-card';
                    card.dataset.cardKey = 'hymn-manager';
                    card.href = 'manager.html';
                    card.className = cardClass;
                    card.innerHTML = `
                        <div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-sm group-hover:bg-primary-fixed transition-colors duration-300">
                            <span class="material-symbols-outlined text-[32px] text-primary" style='font-variation-settings: "FILL" 1;'>library_music</span>
                        </div>
                        <h2 class="font-headline-md text-headline-md text-on-surface mb-base">Hymn Manager</h2>
                        <p class="font-body-md text-body-md text-on-surface-variant">Add &amp; edit the hymn catalog.</p>
                    `;
                    // Place it right after the Hymn Directory card
                    grid.insertBefore(card, grid.children[1] || null);
                }

                // Shepherd Dashboard — elders and super_admins
                if (grid && !document.getElementById('shepherding-card') &&
                    ['elder', 'super_admin'].includes(userRole)) {
                    const card = document.createElement('a');
                    card.id = 'shepherding-card';
                    card.dataset.cardKey = 'shepherding';
                    card.href = 'shepherding-dashboard.html';
                    card.className = cardClass;
                    card.innerHTML = `
                        <div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-sm group-hover:bg-primary-fixed transition-colors duration-300">
                            <span class="material-symbols-outlined text-[32px] text-primary" style='font-variation-settings: "FILL" 1;'>shield_person</span>
                        </div>
                        <h2 class="font-headline-md text-headline-md text-on-surface mb-base">Shepherd Dashboard</h2>
                        <p class="font-body-md text-body-md text-on-surface-variant">Elder tools &amp; member care.</p>
                    `;
                    grid.appendChild(card);
                }

                // Admin Dashboard — admins and super_admins. Hosts the admin tools (SMS, etc.).
                if (grid && !document.getElementById('admin-dashboard-card') &&
                    ['admin', 'super_admin'].includes(userRole)) {
                    const card = document.createElement('a');
                    card.id = 'admin-dashboard-card';
                    card.dataset.cardKey = 'admin-dashboard';
                    card.href = 'admin-dashboard.html';
                    card.className = cardClass;
                    card.innerHTML = `
                        <div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-sm group-hover:bg-primary-fixed transition-colors duration-300">
                            <span class="material-symbols-outlined text-[32px] text-primary" style='font-variation-settings: "FILL" 1;'>admin_panel_settings</span>
                        </div>
                        <h2 class="font-headline-md text-headline-md text-on-surface mb-base">Admin Dashboard</h2>
                        <p class="font-body-md text-body-md text-on-surface-variant">SMS &amp; system admin tools.</p>
                    `;
                    grid.appendChild(card);
                }

                // Apply the user's saved card arrangement, then make the cards
                // drag-to-reorder. Cards the user hasn't ordered yet (e.g. ones
                // newly unlocked by a promotion) fall to the end automatically.
                applyDashboardOrder(grid, savedCardOrder);
                setupCardReordering(user.uid, grid);
            } else {
                greetingEl.textContent = baseGreeting;
            }

            // 3. Fetch Next Sunday's Service
            try {
                const today = new Date();
                const nextSunday = new Date(today);
                // Calculate next Sunday (or today if it's Sunday)
                nextSunday.setDate(today.getDate() + (7 - today.getDay()) % 7);
                
                // If it's Sunday afternoon, look at NEXT Sunday
                if (today.getDay() === 0 && today.getHours() >= 12) {
                    nextSunday.setDate(nextSunday.getDate() + 7);
                }
                
                // Match project's date format (YYYY-MM-DD)
                const dateKey = `${nextSunday.getFullYear()}-${String(nextSunday.getMonth() + 1).padStart(2, '0')}-${String(nextSunday.getDate()).padStart(2, '0')}`;
                console.log("Fetching service data for:", dateKey);
                
                const doc = await db.collection('services').doc(dateKey).get();
                
                if (doc.exists) {
                    // Normalize dotted-key literal fields (e.g. 'liturgy.sermon') created by older
                    // inline-calendar saves that used set()+merge, which stores them as top-level
                    // field names containing a dot rather than as nested paths.
                    const _raw = doc.data();
                    const _norm = {};
                    for (const [k, v] of Object.entries(_raw)) { if (!k.includes('.')) _norm[k] = v; }
                    for (const [k, v] of Object.entries(_raw)) {
                        if (k.includes('.')) {
                            const parts = k.split('.');
                            let obj = _norm;
                            for (let i = 0; i < parts.length - 1; i++) {
                                if (typeof obj[parts[i]] !== 'object' || obj[parts[i]] === null) obj[parts[i]] = {};
                                obj = obj[parts[i]];
                            }
                            const leaf = parts[parts.length - 1];
                            if (!obj[leaf]) obj[leaf] = v;
                        }
                    }
                    const svc = _norm;
                    console.log("Service data found:", svc);
                    
                    // Update Upcoming Text (under greeting)
                    if (svc.liturgy?.sermon || svc.preacher) {
                        const parts = [];
                        if (svc.liturgy?.sermon) parts.push(svc.liturgy.sermon);
                        if (svc.preacher) parts.push(svc.preacher);
                        
                        upcomingText.textContent = `Upcoming: ${parts.join(', ')}`;
                        upcomingBox.classList.remove('hidden');
                        upcomingBox.classList.add('flex');
                    } else {
                        upcomingBox.classList.add('hidden');
                        upcomingBox.classList.remove('flex');
                    }

                    // Update Sunday at a Glance Panel
                    let glanceHtml = '';
                    
                    if (svc.isIrregular) {
                        glanceHtml = ''; // Irregular services don't flag the glance panel
                    } else {
                        if (svc.theme) {
                            glanceHtml += `
                                <div class="flex flex-col">
                                    <span class="text-xs font-label-md text-on-surface-variant uppercase tracking-wider">Theme</span>
                                    <span class="text-body-lg text-primary font-medium">${svc.theme}</span>
                                </div>
                            `;
                        }
                        
                        if (svc.preacher) {
                            glanceHtml += `
                                <div class="flex flex-col">
                                    <span class="text-xs font-label-md text-on-surface-variant uppercase tracking-wider">Preacher</span>
                                    <span class="text-body-md text-on-surface">${svc.preacher}</span>
                                </div>
                            `;
                        }

                        const roles = [];
                        if (svc.serviceLeader) roles.push({ label: 'Service Leader', name: svc.serviceLeader });
                        if (svc.musicLeader) roles.push({ label: 'Music Leader', name: svc.musicLeader });

                        if (roles.length > 0) {
                            glanceHtml += `
                                <div class="flex flex-col gap-xs mt-xs">
                                    <span class="text-xs font-label-md text-on-surface-variant uppercase tracking-wider">Roles</span>
                                    <div class="flex flex-col gap-1">
                                        ${roles.map(r => `
                                            <div class="flex justify-between text-sm">
                                                <span class="text-on-surface-variant">${r.label}</span>
                                                <span class="text-on-surface font-medium">${r.name}</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `;
                        }
                    }

                    // Pastoral Prayer
                    const prayers = [];
                    if (svc.liturgy?.prayerMale?.name) prayers.push(svc.liturgy.prayerMale.name);
                    if (svc.liturgy?.prayerFemale?.name) prayers.push(svc.liturgy.prayerFemale.name);

                    if (prayers.length > 0) {
                        glanceHtml += `
                            <div class="flex flex-col gap-xs mt-xs">
                                <span class="text-xs font-label-md text-on-surface-variant uppercase tracking-wider">Pastoral Prayer</span>
                                <div class="flex flex-col gap-1">
                                    ${prayers.map(p => `
                                        <div class="flex items-center gap-xs text-on-surface">
                                            <span class="material-symbols-outlined text-[20px] text-primary">favorite</span>
                                            <span class="text-sm font-medium">${p}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `;
                    }

                    if (svc.hasBaptism) {
                        const bap = svc.liturgy?.baptism;
                        const baptismName = (Array.isArray(bap)
                            ? bap.map(c => c && c.name).filter(Boolean).join(', ')
                            : (typeof bap === 'string' ? bap : '')) || 'Name not specified';
                        glanceHtml += `
                            <div class="mt-xs flex flex-col gap-xs">
                                <span class="text-xs font-label-md text-on-surface-variant uppercase tracking-wider">Baptism</span>
                                <div class="flex items-center gap-xs text-secondary">
                                    <span class="material-symbols-outlined text-[20px]">water_drop</span>
                                    <span class="text-sm font-medium">${baptismName}</span>
                                </div>
                            </div>
                        `;
                    }

                    if (glanceHtml) {
                        glanceContent.innerHTML = glanceHtml;
                    } else {
                        glanceContent.innerHTML = '<p class="text-on-surface-variant italic">No specific details set for this Sunday yet.</p>';
                    }

                    // 4. Check for Incomplete Fields and Literal Hymns
                    const liturgy = svc.liturgy || {};
                    const missingFields = [];
                    const literalHymns = [];

                    // Check Roles
                    if (!svc.serviceLeader) missingFields.push('Service Leader');
                    if (!svc.musicLeader) missingFields.push('Music Leader');
                    if (!svc.preacher) missingFields.push('Preacher');

                    // Check Liturgy Text Fields
                    const textFields = [
                        { val: liturgy.callToWorship, label: 'Call to Worship' },
                        { val: liturgy.callToConfession, label: 'Call to Confession' },
                        { val: liturgy.assuranceOfPardon, label: 'Assurance of Pardon' },
                        { val: liturgy.scriptureReading, label: 'Scripture Reading' },
                        { val: liturgy.sermon, label: 'Sermon' },
                        { val: liturgy.benediction, label: 'Benediction' }
                    ];
                    textFields.forEach(f => {
                        if (!f.val || f.val.trim() === '') missingFields.push(f.label);
                    });
                    // Baptism Candidates are a Person-ref list, not text: missing when none are set.
                    if (svc.hasBaptism) {
                        const bap = liturgy.baptism;
                        const candidateCount = Array.isArray(bap)
                            ? bap.filter(c => c && c.name).length
                            : (typeof bap === 'string' && bap.trim() ? 1 : 0);
                        if (candidateCount === 0) missingFields.push('Baptism');
                    }

                    // Check Hymn Fields
                    const hymnFields = [
                        { val: liturgy.preparatoryHymn, label: 'Preparatory Hymn' },
                        { val: liturgy.hymn1, label: 'Hymn 1' },
                        { val: liturgy.hymnMid2, label: 'Hymn Mid 2' },
                        { val: liturgy.hymnEnd1, label: 'Hymn End 1' },
                        { val: liturgy.hymnEnd2, label: 'Hymn End 2' }
                    ];
                    if (!svc.hasBaptism) {
                        hymnFields.push({ val: liturgy.hymn2, label: 'Hymn 2' });
                        hymnFields.push({ val: liturgy.hymnMid1, label: 'Hymn Mid 1' });
                    }

                    hymnFields.forEach(f => {
                        if (!f.val || !f.val.name || f.val.name.trim() === '') {
                            missingFields.push(f.label);
                        } else if (!f.val.id) {
                            literalHymns.push(f.label);
                        }
                    });

                    const totalIssues = missingFields.length + literalHymns.length;

                    if (['editor', 'elder', 'admin', 'super_admin'].includes(userRole)) {
                        const actionDiv = document.createElement('div');
                        actionDiv.className = 'mt-auto pt-md flex flex-col gap-2';
                        
                        if (!svc.isIrregular && totalIssues > 0) {
                            const alertDiv = document.createElement('a');
                            alertDiv.href = `service-builder.html?date=${dateKey}&validate=true`;
                            alertDiv.className = 'flex items-center justify-between group/alert cursor-pointer';
                            
                            let message = '';
                            if (missingFields.length > 0 && literalHymns.length > 0) {
                                message = `${totalIssues} items need attention (missing fields & unlinked hymns)`;
                            } else if (literalHymns.length > 0) {
                                message = `${literalHymns.length} hymn${literalHymns.length > 1 ? 's' : ''} not linked to database`;
                            } else {
                                message = `${missingFields.length} field${missingFields.length > 1 ? 's' : ''} not completed`;
                            }

                            alertDiv.innerHTML = `
                                <div class="flex items-center gap-2 bg-error-container text-on-error-container px-3 py-2 rounded-lg w-full transition-transform group-hover/alert:scale-[1.02]">
                                    <span class="material-symbols-outlined text-[20px]">warning</span>
                                    <span class="text-sm font-medium">${message}</span>
                                    <span class="material-symbols-outlined text-[18px] ml-auto">chevron_right</span>
                                </div>
                            `;
                            actionDiv.appendChild(alertDiv);
                        }

                        const editBtn = document.createElement('a');
                        editBtn.href = `service-builder.html?date=${dateKey}`;
                        editBtn.className = 'flex items-center justify-center group';
                        editBtn.innerHTML = `
                            <div class="flex items-center gap-2 bg-primary text-on-primary px-4 py-2 rounded-lg w-full justify-center transition-all hover:bg-primary/90 shadow-sm">
                                <span class="material-symbols-outlined text-[20px]">edit</span>
                                <span class="text-sm font-medium">Open in Service Editor</span>
                            </div>
                        `;
                        actionDiv.appendChild(editBtn);
                        glanceContent.appendChild(actionDiv);
                    }
                } else {
                    console.log("No service data found for:", dateKey);
                    glanceContent.innerHTML = '<p class="text-on-surface-variant italic">No service data found for this Sunday.</p>';
                    
                    if (['editor', 'elder', 'admin', 'super_admin'].includes(userRole)) {
                        const createBtn = document.createElement('a');
                        createBtn.href = `service-builder.html?date=${dateKey}`;
                        createBtn.className = 'mt-auto pt-md flex items-center justify-center group';
                        createBtn.innerHTML = `
                            <div class="flex items-center gap-2 bg-primary text-on-primary px-4 py-2 rounded-lg w-full justify-center transition-all hover:bg-primary/90 shadow-sm">
                                <span class="material-symbols-outlined text-[20px]">add</span>
                                <span class="text-sm font-medium">Create Service</span>
                            </div>
                        `;
                        glanceContent.appendChild(createBtn);
                    }

                    upcomingBox.classList.add('hidden');
                    upcomingBox.classList.remove('flex');
                }
            } catch (e) {
                console.error("Error updating dashboard data:", e);
                glanceContent.innerHTML = '<p class="text-error italic">Failed to load service details.</p>';
            }
        }

        // Initialize on load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', updateDashboard);
        } else {
            updateDashboard();
        }
    </script>
</body>

</html>
