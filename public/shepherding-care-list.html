<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Care List | Mosaic Shepherd</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="mosaic-theme.js"></script>
    <style type="text/tailwindcss">
        [x-cloak] { display: none !important; }
        .ProseMirror { outline: none; min-height: 100px; padding: 12px; box-sizing: border-box; }
        .ProseMirror p { margin: 0 0 0.5em; }
        .ProseMirror p:last-child { margin-bottom: 0; }
        .ProseMirror ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 0.5em; }
        .ProseMirror ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 0.5em; }
        .mention-chip { display:inline; background:#d8e2ff; color:#001a42; border-radius:3px; padding:0 4px; font-weight:500; text-decoration:none; cursor:pointer; }
        .ProseMirror table { border-collapse:collapse; width:100%; margin-bottom:0.5em; table-layout:fixed; }
        .ProseMirror th, .ProseMirror td { border:1px solid #c5c6d0; padding:4px 8px; min-width:50px; position:relative; vertical-align:top; }
        .care-list-row:nth-child(even) { background-color: #f6f3ed; }
        .active-editor-row { outline: 2px solid #182F57; outline-offset: -2px; }
        .ProseMirror-selectednode[data-action-chip] { outline: 2px solid #182F57; outline-offset: 1px; border-radius: 3px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-background text-on-background font-body-md text-body-md antialiased h-screen overflow-hidden flex flex-col"
      x-data="careListEditor" x-cloak
      data-key-legend="mention,addTag,removeTag,status">

    <!-- Header -->
    <header class="w-full max-w-6xl mx-auto px-4 md:px- margin pt-2 md:pt-md flex items-center justify-between">
        <a href="shepherding-documents.html" class="flex items-center gap-1 text-on-surface-variant hover:text-primary transition-colors duration-200">
            <span class="material-symbols-outlined text-[20px]">arrow_back</span>
            <span class="font-label-md text-label-md">Documents</span>
        </a>
        <div class="flex items-center gap-md">
            <!-- Save status -->
            <div class="flex items-center gap-xs">
                <template x-if="saveStatus === 'saving'">
                    <span class="flex items-center gap-xs font-label-md text-label-md text-on-surface-variant">
                        <span class="material-symbols-outlined text-[14px] animate-spin">progress_activity</span>
                        Saving…
                    </span>
                </template>
                <template x-if="saveStatus === 'saved'">
                    <span class="flex items-center gap-xs font-label-md text-label-md text-on-surface-variant">
                        <span class="material-symbols-outlined text-[14px]">check_circle</span>
                        Saved
                    </span>
                </template>
                <template x-if="saveStatus === 'unsaved'">
                    <span class="font-label-md text-label-md text-outline">Unsaved changes</span>
                </template>
            </div>
            <div id="auth-container" class="flex items-center">
                <div class="h-10"></div>
            </div>
        </div>
    </header>

    <!-- Loading -->
    <div x-show="loading" class="flex-grow flex items-center justify-center">
        <span class="material-symbols-outlined text-[48px] text-outline animate-spin">progress_activity</span>
    </div>

    <!-- Main -->
    <main x-show="!loading" class="flex-grow overflow-hidden max-w-6xl w-full mx-auto px-4 md:px-margin pb-lg flex flex-col gap-sm pt-md">

        <!-- Title -->
        <input type="text"
               x-model="title"
               @input="onTitleInput()"
               placeholder="Care List title…"
               class="w-full font-headline-lg text-headline-lg text-primary bg-transparent border-0 border-b-2 border-transparent focus:border-outline-variant focus:outline-none pb-xs transition-colors placeholder-outline" />

        <!-- Metadata & Filter Info -->
        <div class="flex flex-wrap items-center justify-between pb-xs border-b border-outline-variant">
            <div class="flex items-center gap-sm">
                <span class="font-label-md text-label-md text-on-surface-variant" x-text="'Created by ' + (doc?.authorName || '…')"></span>
                <span class="font-label-md text-label-md text-outline">·</span>
                <span class="font-label-md text-label-md text-on-surface-variant" x-text="formatDate(doc?.createdAt)"></span>
            </div>
            <div class="flex items-center gap-sm">
                <span class="material-symbols-outlined text-sm text-secondary">filter_list</span>
                <span class="font-label-md text-label-md text-secondary" x-text="'Filter: ' + filterTitle"></span>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="flex items-center flex-wrap gap-xs px-md py-xs border border-outline-variant bg-surface-container rounded-xl">

            <!-- Font Family -->
            <select @change="editorCmd('setFontFamily', $event.target.value)"
                    class="border border-outline-variant rounded px-2 py-1 text-xs font-label-md text-on-surface-variant bg-surface-container hover:bg-surface-container-high focus:outline-none focus:ring-1 focus:ring-primary/30 cursor-pointer">
                <option value="">Font</option>
                <option value="Work Sans, sans-serif">Work Sans</option>
                <option value="Noto Serif, serif">Noto Serif</option>
                <option value="monospace">Monospace</option>
            </select>

            <!-- Font Size -->
            <select @change="editorCmd('setFontSize', $event.target.value)"
                    class="border border-outline-variant rounded px-2 py-1 text-xs font-label-md text-on-surface-variant bg-surface-container hover:bg-surface-container-high focus:outline-none focus:ring-1 focus:ring-primary/30 cursor-pointer">
                <option value="">Size</option>
                <option value="12px">Small (12)</option>
                <option value="14px">14</option>
                <option value="16px">Normal (16)</option>
                <option value="18px">18</option>
                <option value="20px">Large (20)</option>
                <option value="24px">24</option>
            </select>

            <div class="w-px h-5 bg-outline-variant mx-xs"></div>

            <button type="button" @mousedown.prevent="editorCmd('toggleBold')"
                :class="editorUpdated >= 0 && isActive('bold') ? 'bg-primary text-on-primary' : 'text-on-surface-variant hover:bg-surface-container-high'"
                class="w-8 h-8 rounded flex items-center justify-center font-bold text-sm transition-colors" title="Bold">B</button>
            <button type="button" @mousedown.prevent="editorCmd('toggleItalic')"
                :class="editorUpdated >= 0 && isActive('italic') ? 'bg-primary text-on-primary' : 'text-on-surface-variant hover:bg-surface-container-high'"
                class="w-8 h-8 rounded flex items-center justify-center italic text-sm transition-colors" title="Italic">I</button>
            <button type="button" @mousedown.prevent="editorCmd('toggleUnderline')"
                :class="editorUpdated >= 0 && isActive('underline') ? 'bg-primary text-on-primary' : 'text-on-surface-variant hover:bg-surface-container-high'"
                class="w-8 h-8 rounded flex items-center justify-center underline text-sm transition-colors" title="Underline">U</button>

            <div class="w-px h-5 bg-outline-variant mx-xs"></div>

            <button type="button" @mousedown.prevent="editorCmd('toggleBulletList')"
                :class="editorUpdated >= 0 && isActive('bulletList') ? 'bg-primary text-on-primary' : 'text-on-surface-variant hover:bg-surface-container-high'"
                class="w-8 h-8 rounded flex items-center justify-center transition-colors" title="Bullet list">
                <span class="material-symbols-outlined text-[16px]">format_list_bulleted</span>
            </button>
            <button type="button" @mousedown.prevent="editorCmd('toggleOrderedList')"
                :class="editorUpdated >= 0 && isActive('orderedList') ? 'bg-primary text-on-primary' : 'text-on-surface-variant hover:bg-surface-container-high'"
                class="w-8 h-8 rounded flex items-center justify-center transition-colors" title="Numbered list">
                <span class="material-symbols-outlined text-[16px]">format_list_numbered</span>
            </button>

            <div class="w-px h-5 bg-outline-variant mx-xs"></div>

            <!-- Highlight -->
            <div class="relative" x-data="{ open: false }">
                <button type="button" @mousedown.prevent="open = !open"
                    :class="editorUpdated >= 0 && isActive('highlight') ? 'bg-primary text-on-primary' : 'text-on-surface-variant hover:bg-surface-container-high'"
                    class="w-8 h-8 rounded flex items-center justify-center transition-colors" title="Highlight">
                    <span class="material-symbols-outlined text-[16px]">highlight</span>
                </button>
                <div x-show="open" @mousedown.outside="open = false" style="display:none;min-width:116px"
                     class="absolute top-full left-0 mt-1 bg-surface-container-lowest border border-outline-variant rounded-lg shadow-md z-50 p-2 flex flex-wrap gap-1">
                    <button type="button" @mousedown.prevent="editorCmd('setHighlight', '#fef08a'); open = false" class="w-6 h-6 rounded border border-outline-variant hover:scale-110 transition-transform" style="background:#fef08a"></button>
                    <button type="button" @mousedown.prevent="editorCmd('setHighlight', '#bbf7d0'); open = false" class="w-6 h-6 rounded border border-outline-variant hover:scale-110 transition-transform" style="background:#bbf7d0"></button>
                    <button type="button" @mousedown.prevent="editorCmd('setHighlight', '#bfdbfe'); open = false" class="w-6 h-6 rounded border border-outline-variant hover:scale-110 transition-transform" style="background:#bfdbfe"></button>
                    <button type="button" @mousedown.prevent="editorCmd('setHighlight', '#fecaca'); open = false" class="w-6 h-6 rounded border border-outline-variant hover:scale-110 transition-transform" style="background:#fecaca"></button>
                    <button type="button" @mousedown.prevent="editorCmd('setHighlight', null); open = false" class="w-6 h-6 rounded border border-outline-variant hover:bg-surface-container flex items-center justify-center text-on-surface-variant">
                        <span class="material-symbols-outlined text-[12px]">close</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Care List Table -->
        <div class="bg-surface-container-lowest border border-outline-variant rounded-xl flex-grow overflow-auto">
            <div :style="`min-width: ${224 + 48 + careListColumns.length * 320}px`">

                <!-- Header row -->
                <div class="flex border-b border-outline-variant bg-surface-container sticky top-0 z-20">
                    <div class="w-56 flex-shrink-0 px-md py-xs border-r border-outline-variant sticky left-0 bg-surface-container z-30 font-label-md text-xs uppercase tracking-wider text-on-surface-variant">
                        Person
                    </div>
                    <template x-for="col in careListColumns" :key="col.id">
                        <div class="w-80 flex-shrink-0 border-r border-outline-variant px-md py-xs flex items-center gap-xs">
                            <template x-if="editingColumnId !== col.id">
                                <div class="flex items-center gap-xs flex-grow min-w-0">
                                    <span class="font-label-md text-xs uppercase tracking-wider text-on-surface-variant truncate flex-grow cursor-pointer"
                                          x-text="col.name" @dblclick="startEditColumnName(col.id, col.name)"></span>
                                    <button @click="startEditColumnName(col.id, col.name)"
                                        class="text-on-surface-variant hover:text-primary flex-shrink-0 opacity-60 hover:opacity-100 transition-opacity">
                                        <span class="material-symbols-outlined text-[13px]">edit</span>
                                    </button>
                                    <button x-show="careListColumns.length > 1" @click="deleteColumn(col.id)"
                                        class="text-on-surface-variant hover:text-error flex-shrink-0 opacity-60 hover:opacity-100 transition-opacity">
                                        <span class="material-symbols-outlined text-[13px]">close</span>
                                    </button>
                                </div>
                            </template>
                            <template x-if="editingColumnId === col.id">
                                <input type="text" :id="'col-name-input-' + col.id"
                                       x-model="editingColumnName"
                                       @blur="saveColumnName(col.id)"
                                       @keydown.enter.prevent="saveColumnName(col.id)"
                                       @keydown.escape="editingColumnId = null"
                                       class="flex-grow text-xs font-label-md border-b border-primary bg-transparent focus:outline-none text-on-surface-variant uppercase tracking-wider" />
                            </template>
                        </div>
                    </template>
                    <div class="w-12 flex-shrink-0 flex items-center justify-center">
                        <button @click="addColumn()" title="Add column"
                            class="text-on-surface-variant hover:text-primary transition-colors p-1">
                            <span class="material-symbols-outlined text-[20px]">add</span>
                        </button>
                    </div>
                </div>

                <!-- Data rows -->
                <template x-for="(person, idx) in filteredPeople" :key="person.id">
                    <div class="flex border-b border-outline-variant last:border-b-0"
                         :class="idx % 2 === 0 ? 'bg-surface-container-lowest' : 'bg-surface-container-low'">

                        <!-- Sticky name column -->
                        <div class="w-56 flex-shrink-0 px-md py-sm flex flex-col gap-xs sticky left-0 z-10 border-r border-outline-variant"
                             :class="idx % 2 === 0 ? 'bg-surface-container-lowest' : 'bg-surface-container-low'">
                            <a :href="'shepherding-profile.html?id=' + person.id + '&fromPage=carelist&fromId=' + encodeURIComponent(docId) + '&fromTitle=' + encodeURIComponent(title)"
                               class="font-semibold text-primary hover:underline text-sm leading-tight" x-text="person.name"></a>
                            <div class="flex flex-wrap gap-1">
                                <template x-for="tagId in [...new Set(person.tags || [])]" :key="tagId">
                                    <span class="text-[10px] bg-secondary-container text-on-secondary-container px-2 py-0.5 rounded-full"
                                          x-text="getTagName(tagId)"></span>
                                </template>
                            </div>
                            <template x-if="person.shepherdingStatus">
                                <span class="text-[10px] text-secondary font-medium" x-text="formatStatusShort(person.shepherdingStatus)"></span>
                            </template>
                        </div>

                        <!-- Per-column cells -->
                        <template x-for="col in careListColumns" :key="col.id">
                            <div class="w-80 flex-shrink-0 border-r border-outline-variant relative min-h-[100px]"
                                 :class="activePersonId === person.id && activeColId === col.id ? 'ring-2 ring-inset ring-primary/40' : ''">
                                <div :id="'editor-' + person.id + '-' + col.id"
                                     class="h-full cursor-text min-h-[100px]"
                                     @focusin="activePersonId = person.id; activeColId = col.id"></div>
                            </div>
                        </template>
                    </div>
                </template>

                <div x-show="filteredPeople.length === 0" class="py-xl text-center text-on-surface-variant italic">
                    No people match this filter.
                </div>
            </div>
        </div>
    </main>

    <!-- Toast -->
    <div x-show="toast.show" x-cloak x-transition
         class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-lg py-sm rounded-lg shadow-lg font-label-md text-label-md"
         :class="toast.type === 'error' ? 'bg-error text-on-error' : 'bg-inverse-surface text-inverse-on-surface'">
        <span x-text="toast.message"></span>
    </div>

    <script src="shepherding-core.js"></script>
    <script src="shepherding-inline-triggers.js"></script>
    <script src="shepherding-care-list.js"></script>
    <script src="shepherding-key-legend.js"></script>
</body>
</html>
