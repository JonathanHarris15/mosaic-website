<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>People | Mosaic Shepherd</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-primary": "#b2c6f8",
                        "surface-variant": "#e5e2dc",
                        "on-primary": "#ffffff",
                        "primary": "#001a43",
                        "on-primary-fixed-variant": "#314670",
                        "on-tertiary-container": "#67a1b5",
                        "on-secondary-fixed-variant": "#2b4969",
                        "surface-container-low": "#f6f3ed",
                        "tertiary": "#001f28",
                        "on-tertiary-fixed": "#001f28",
                        "secondary-container": "#b9d7fe",
                        "secondary-fixed-dim": "#abc9ef",
                        "surface": "#fcf9f3",
                        "outline-variant": "#c5c6d0",
                        "primary-container": "#1a3059",
                        "secondary": "#436082",
                        "on-secondary": "#ffffff",
                        "on-surface": "#1c1c18",
                        "primary-fixed": "#d8e2ff",
                        "surface-container-highest": "#e5e2dc",
                        "on-primary-container": "#8499c8",
                        "on-secondary-fixed": "#001d36",
                        "surface-dim": "#dcdad4",
                        "on-secondary-container": "#415e7f",
                        "on-surface-variant": "#44474e",
                        "tertiary-container": "#003643",
                        "primary-fixed-dim": "#b2c6f8",
                        "tertiary-fixed-dim": "#95cfe4",
                        "tertiary-fixed": "#b5ebff",
                        "on-primary-fixed": "#001a42",
                        "error": "#ba1a1a",
                        "surface-bright": "#fcf9f3",
                        "on-background": "#1c1c18",
                        "on-tertiary-fixed-variant": "#004e60",
                        "secondary-fixed": "#d1e4ff",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "inverse-surface": "#31312d",
                        "on-error-container": "#93000a",
                        "outline": "#75777f",
                        "surface-container": "#f0eee8",
                        "surface-container-high": "#ebe8e2",
                        "inverse-on-surface": "#f3f0ea",
                        "surface-tint": "#4a5e8a",
                        "surface-container-lowest": "#ffffff",
                        "background": "#fcf9f3",
                        "error-container": "#ffdad6"
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"
                    },
                    spacing: {
                        "gutter": "24px", "base": "8px", "md": "24px", "xs": "4px",
                        "xl": "80px", "margin": "32px", "sm": "12px", "lg": "48px"
                    },
                    fontFamily: {
                        "headline-md": ["Noto Serif"], "display-lg": ["Noto Serif"],
                        "label-md": ["Work Sans"], "headline-lg": ["Noto Serif"],
                        "body-lg": ["Work Sans"], "body-md": ["Work Sans"]
                    },
                    fontSize: {
                        "headline-md": ["24px", { lineHeight: "1.3", fontWeight: "600" }],
                        "display-lg": ["48px", { lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "700" }],
                        "label-md": ["14px", { lineHeight: "1.2", letterSpacing: "0.05em", fontWeight: "600" }],
                        "headline-lg": ["32px", { lineHeight: "1.2", fontWeight: "600" }],
                        "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
                        "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }]
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        [x-cloak] { display: none !important; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-functions-compat.js"></script>
    <script src="auth.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-background text-on-background font-body-md text-body-md antialiased min-h-screen flex flex-col"
      x-data="shepherdingPeople" x-cloak>

    <!-- Header -->
    <header class="w-full max-w-7xl mx-auto px-4 md:px-margin pt-2 md:pt-md flex items-center justify-between">
        <a href="shepherding-dashboard.html" class="flex items-center gap-1 text-on-surface-variant hover:text-primary transition-colors duration-200">
            <span class="material-symbols-outlined text-[20px]">arrow_back</span>
            <span class="font-label-md text-label-md">Dashboard</span>
        </a>
        <div id="auth-container" class="flex items-center">
            <div class="h-10"></div>
        </div>
    </header>

    <!-- Loading state -->
    <div x-show="loading" class="flex-grow flex items-center justify-center">
        <span class="material-symbols-outlined text-[48px] text-outline animate-spin">progress_activity</span>
    </div>

    <!-- Main content -->
    <main x-show="!loading" class="flex-grow max-w-7xl w-full mx-auto px-4 md:px-margin pb-lg flex flex-col gap-margin pt-md">

        <!-- Page Title -->
        <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-md">
            <div>
                <h1 class="font-headline-lg text-headline-lg text-primary">People</h1>
                <p class="font-body-md text-body-md text-on-surface-variant mt-xs">
                    <span x-text="filteredPeople.length"></span> of <span x-text="people.length"></span> people shown
                </p>
            </div>
            <!-- Sort control -->
            <div class="flex items-center gap-sm">
                <span class="font-label-md text-label-md text-on-surface-variant">Sort by</span>
                <div class="flex rounded-lg border border-outline-variant overflow-hidden">
                    <button @click="sortBy = 'name'"
                        :class="sortBy === 'name' ? 'bg-primary text-on-primary' : 'bg-surface-container-lowest text-on-surface-variant hover:bg-surface-container'"
                        class="px-sm py-xs font-label-md text-label-md transition-colors">
                        Name
                    </button>
                    <button @click="sortBy = 'attention'"
                        :class="sortBy === 'attention' ? 'bg-primary text-on-primary' : 'bg-surface-container-lowest text-on-surface-variant hover:bg-surface-container'"
                        class="px-sm py-xs font-label-md text-label-md transition-colors border-l border-outline-variant">
                        Needs Attention
                    </button>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg flex flex-col gap-md">

            <!-- Search -->
            <div class="relative">
                <span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-[20px] text-outline pointer-events-none">search</span>
                <input type="text" x-model="search" placeholder="Search by name…"
                       class="w-full pl-[40px] pr-md py-sm border border-outline-variant rounded-lg font-body-md text-body-md bg-surface focus:outline-none focus:ring-2 focus:ring-primary/30" />
            </div>

            <!-- Tag filter -->
            <div class="flex flex-col gap-xs" x-show="shepherdingTags.length > 0">
                <div class="flex items-center justify-between">
                    <span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider text-xs">Tags</span>
                    <div class="flex items-center gap-xs" x-show="tagFilters.length > 1">
                        <button @click="tagFilterMode = 'any'"
                            :class="tagFilterMode === 'any' ? 'bg-secondary-container text-on-secondary-container' : 'text-on-surface-variant hover:bg-surface-container'"
                            class="px-xs py-[2px] font-label-md text-label-md rounded transition-colors text-xs">
                            Match any
                        </button>
                        <button @click="tagFilterMode = 'all'"
                            :class="tagFilterMode === 'all' ? 'bg-secondary-container text-on-secondary-container' : 'text-on-surface-variant hover:bg-surface-container'"
                            class="px-xs py-[2px] font-label-md text-label-md rounded transition-colors text-xs">
                            Match all
                        </button>
                    </div>
                </div>
                <div class="flex flex-wrap gap-xs">
                    <template x-for="tag in shepherdingTags" :key="tag.id">
                        <button @click="toggleTagFilter(tag.id)"
                            :class="tagFilters.includes(tag.id)
                                ? 'bg-primary text-on-primary'
                                : 'bg-surface-container text-on-surface hover:bg-surface-container-high'"
                            class="px-sm py-xs font-label-md text-label-md rounded-full transition-colors"
                            x-text="tag.name">
                        </button>
                    </template>
                </div>
            </div>
        </div>

        <!-- People table -->
        <div class="bg-surface-container-lowest border border-outline-variant rounded-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-surface-container">
                        <tr>
                            <th class="text-left px-lg py-sm font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Name</th>
                            <th class="text-left px-lg py-sm font-label-md text-label-md text-on-surface-variant uppercase tracking-wider hidden md:table-cell">Tags</th>
                            <th class="text-left px-lg py-sm font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Last Note</th>
                            <th class="px-lg py-sm"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="person in filteredPeople" :key="person.id">
                            <tr class="border-t border-outline-variant hover:bg-surface-container-low transition-colors cursor-pointer"
                                @click="window.location.href = `shepherding-profile.html?id=${person.id}`">
                                <td class="px-lg py-sm font-body-md text-on-surface" x-text="person.name"></td>
                                <td class="px-lg py-sm hidden md:table-cell">
                                    <div class="flex flex-wrap gap-xs">
                                        <template x-for="tagId in (person.tags || [])" :key="tagId">
                                            <span class="px-xs py-[2px] bg-primary-fixed text-on-primary-fixed rounded font-label-md text-label-md"
                                                  x-text="getTagName(tagId)"></span>
                                        </template>
                                        <span x-show="!(person.tags || []).length"
                                              class="text-outline font-label-md text-label-md">—</span>
                                    </div>
                                </td>
                                <td class="px-lg py-sm">
                                    <span class="font-label-md text-label-md"
                                          :class="lastNoteColor(person.id)"
                                          x-text="formatLastNote(person.id)"></span>
                                </td>
                                <td class="px-lg py-sm text-right">
                                    <span class="material-symbols-outlined text-[18px] text-outline">chevron_right</span>
                                </td>
                            </tr>
                        </template>

                        <!-- Empty state -->
                        <tr x-show="filteredPeople.length === 0">
                            <td colspan="4" class="px-lg py-lg text-center text-on-surface-variant italic">
                                No people match your current filters.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- Toast -->
    <div x-show="toast.show" x-cloak x-transition
         class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-lg py-sm rounded-lg shadow-lg font-label-md text-label-md"
         :class="toast.type === 'error' ? 'bg-error text-on-error' : 'bg-inverse-surface text-inverse-on-surface'">
        <span x-text="toast.message"></span>
    </div>

    <script src="shepherding-people.js"></script>
</body>
</html>
