<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>People | Mosaic Shepherd</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-primary": "#b2c6f8",
                        "surface-variant": "#e5e2dc",
                        "on-primary": "#ffffff",
                        "primary": "#001a43",
                        "on-primary-fixed-variant": "#314670",
                        "on-tertiary-container": "#67a1b5",
                        "on-secondary-fixed-variant": "#2b4969",
                        "surface-container-low": "#f6f3ed",
                        "tertiary": "#001f28",
                        "on-tertiary-fixed": "#001f28",
                        "secondary-container": "#b9d7fe",
                        "secondary-fixed-dim": "#abc9ef",
                        "surface": "#fcf9f3",
                        "outline-variant": "#c5c6d0",
                        "primary-container": "#1a3059",
                        "secondary": "#436082",
                        "on-secondary": "#ffffff",
                        "on-surface": "#1c1c18",
                        "primary-fixed": "#d8e2ff",
                        "surface-container-highest": "#e5e2dc",
                        "on-primary-container": "#8499c8",
                        "on-secondary-fixed": "#001d36",
                        "surface-dim": "#dcdad4",
                        "on-secondary-container": "#415e7f",
                        "on-surface-variant": "#44474e",
                        "tertiary-container": "#003643",
                        "primary-fixed-dim": "#b2c6f8",
                        "tertiary-fixed-dim": "#95cfe4",
                        "tertiary-fixed": "#b5ebff",
                        "on-primary-fixed": "#001a42",
                        "error": "#ba1a1a",
                        "surface-bright": "#fcf9f3",
                        "on-background": "#1c1c18",
                        "on-tertiary-fixed-variant": "#004e60",
                        "secondary-fixed": "#d1e4ff",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "inverse-surface": "#31312d",
                        "on-error-container": "#93000a",
                        "outline": "#75777f",
                        "surface-container": "#f0eee8",
                        "surface-container-high": "#ebe8e2",
                        "inverse-on-surface": "#f3f0ea",
                        "surface-tint": "#4a5e8a",
                        "surface-container-lowest": "#ffffff",
                        "background": "#fcf9f3",
                        "error-container": "#ffdad6"
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"
                    },
                    spacing: {
                        "gutter": "24px", "base": "8px", "md": "24px", "xs": "4px",
                        "xl": "80px", "margin": "32px", "sm": "12px", "lg": "48px"
                    },
                    fontFamily: {
                        "headline-md": ["Noto Serif"], "display-lg": ["Noto Serif"],
                        "label-md": ["Work Sans"], "headline-lg": ["Noto Serif"],
                        "body-lg": ["Work Sans"], "body-md": ["Work Sans"]
                    },
                    fontSize: {
                        "headline-md": ["24px", { lineHeight: "1.3", fontWeight: "600" }],
                        "display-lg": ["48px", { lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "700" }],
                        "label-md": ["14px", { lineHeight: "1.2", letterSpacing: "0.05em", fontWeight: "600" }],
                        "headline-lg": ["32px", { lineHeight: "1.2", fontWeight: "600" }],
                        "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
                        "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }]
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        [x-cloak] { display: none !important; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-functions-compat.js"></script>
    <script src="auth.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-background text-on-background font-body-md text-body-md antialiased min-h-screen flex flex-col"
      x-data="shepherdingPeople" x-cloak>

    <!-- Header -->
    <header class="w-full max-w-7xl mx-auto px-4 md:px-margin pt-2 md:pt-md flex items-center justify-between">
        <a href="shepherding-dashboard.html" class="flex items-center gap-1 text-on-surface-variant hover:text-primary transition-colors duration-200">
            <span class="material-symbols-outlined text-[20px]">arrow_back</span>
            <span class="font-label-md text-label-md">Dashboard</span>
        </a>
        <div id="auth-container" class="flex items-center">
            <div class="h-10"></div>
        </div>
    </header>

    <!-- Loading state -->
    <div x-show="loading" class="flex-grow flex items-center justify-center">
        <span class="material-symbols-outlined text-[48px] text-outline animate-spin">progress_activity</span>
    </div>

    <!-- Main content -->
    <main x-show="!loading" class="flex-grow max-w-7xl w-full mx-auto px-4 md:px-margin pb-lg flex flex-col gap-margin pt-md">

        <!-- Page Title & Actions -->
        <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-md">
            <div>
                <h1 class="font-headline-lg text-headline-lg text-primary">People</h1>
                <p class="font-body-md text-body-md text-on-surface-variant mt-xs">
                    <span x-text="filteredPeople.length"></span> of <span x-text="people.length"></span> people shown
                </p>
            </div>
            
            <div class="flex flex-col sm:flex-row items-center gap-md">
                <button @click="showAddPersonModal = true"
                    class="w-full sm:w-auto flex items-center justify-center gap-2 px-6 py-2.5 bg-primary text-on-primary font-label-md text-label-md rounded-full hover:bg-primary/90 transition-all shadow-sm active:scale-95">
                    <span class="material-symbols-outlined text-[20px]">person_add</span>
                    <span>Add Person</span>
                </button>

                <!-- Sort control -->
                <div class="flex items-center gap-sm bg-surface-container-low p-1 rounded-xl border border-outline-variant/30">
                    <span class="font-label-md text-[11px] uppercase tracking-widest text-on-surface-variant px-2">Sort by</span>
                    <div class="flex bg-surface-container-lowest rounded-lg border border-outline-variant/50 overflow-hidden shadow-sm">
                        <button @click="sortBy = 'name'"
                            :class="sortBy === 'name' ? 'bg-primary text-on-primary' : 'bg-transparent text-on-surface-variant hover:bg-surface-container'"
                            class="px-4 py-2 font-label-md text-label-md transition-colors">
                            Name
                        </button>
                        <button @click="sortBy = 'attention'"
                            :class="sortBy === 'attention' ? 'bg-primary text-on-primary' : 'bg-transparent text-on-surface-variant hover:bg-surface-container'"
                            class="px-4 py-2 font-label-md text-label-md transition-colors border-l border-outline-variant/50">
                            Needs Attention
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg flex flex-col gap-lg shadow-sm">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-lg items-start">
                <!-- Search -->
                <div class="lg:col-span-5 relative">
                    <span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-[20px] text-outline pointer-events-none">search</span>
                    <input type="text" x-model="search" placeholder="Search by name…"
                           class="w-full pl-[40px] pr-md py-3 border border-outline-variant rounded-xl font-body-md text-body-md bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-primary/30 transition-all" />
                </div>

                <!-- Tag filter -->
                <div class="lg:col-span-7 flex flex-col gap-3" x-show="shepherdingTags.length > 0">
                    <div class="flex items-center justify-between">
                        <span class="font-label-md text-[11px] uppercase tracking-[0.2em] text-on-surface-variant font-bold">Filter by Tags</span>
                        <div class="flex items-center gap-xs" x-show="tagFilters.length > 1">
                            <button @click="tagFilterMode = 'any'"
                                :class="tagFilterMode === 'any' ? 'bg-secondary-container text-on-secondary-container ring-1 ring-secondary/20' : 'text-on-surface-variant hover:bg-surface-container'"
                                class="px-2 py-[2px] font-label-md text-label-md rounded transition-colors text-[10px] uppercase font-bold tracking-wider">
                                Match any
                            </button>
                            <button @click="tagFilterMode = 'all'"
                                :class="tagFilterMode === 'all' ? 'bg-secondary-container text-on-secondary-container ring-1 ring-secondary/20' : 'text-on-surface-variant hover:bg-surface-container'"
                                class="px-2 py-[2px] font-label-md text-label-md rounded transition-colors text-[10px] uppercase font-bold tracking-wider">
                                Match all
                            </button>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <template x-for="tag in shepherdingTags" :key="tag.id">
                            <button @click="toggleTagFilter(tag.id)"
                                :class="tagFilters.includes(tag.id)
                                    ? 'bg-primary text-on-primary ring-2 ring-primary-fixed shadow-md'
                                    : 'bg-surface-container text-on-surface hover:bg-surface-container-high border border-outline-variant/30'"
                                class="px-4 py-1.5 font-label-md text-xs rounded-full transition-all duration-200 active:scale-95"
                                x-text="tag.name">
                            </button>
                        </template>
                    </div>
                </div>
            </div>
        </div>

        <!-- People table -->
        <div class="bg-surface-container-lowest border border-outline-variant rounded-2xl overflow-hidden shadow-sm">
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-sm">
                    <thead class="bg-surface-container-low border-b border-outline-variant">
                        <tr>
                            <th class="text-left px-lg py-4 font-label-md text-[11px] text-on-surface-variant uppercase tracking-[0.2em] font-bold">Member Name</th>
                            <th class="text-left px-lg py-4 font-label-md text-[11px] text-on-surface-variant uppercase tracking-[0.2em] font-bold hidden md:table-cell">Applied Tags</th>
                            <th class="text-left px-lg py-4 font-label-md text-[11px] text-on-surface-variant uppercase tracking-[0.2em] font-bold">Last Shepherding Note</th>
                            <th class="px-lg py-4"></th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-outline-variant/30">
                        <template x-for="person in filteredPeople" :key="person.id">
                            <tr class="hover:bg-primary/5 transition-colors group cursor-pointer"
                                @click="window.location.href = `shepherding-profile.html?id=${person.id}`">
                                <td class="px-lg py-4">
                                    <div class="font-body-md text-on-surface font-bold group-hover:text-primary transition-colors" x-text="person.name"></div>
                                </td>
                                <td class="px-lg py-4 hidden md:table-cell">
                                    <div class="flex items-center gap-2">
                                        <button @click.stop="openTagManagement(person)" 
                                                class="w-7 h-7 rounded-full flex items-center justify-center text-on-surface-variant hover:bg-primary-fixed/30 hover:text-primary transition-all shrink-0">
                                            <span class="material-symbols-outlined text-[18px]">edit</span>
                                        </button>
                                        <div class="flex flex-wrap gap-1.5">
                                            <template x-for="tagId in (person.tags || [])" :key="tagId">
                                                <span class="px-2 py-0.5 bg-primary-fixed/50 text-on-primary-fixed rounded text-[10px] font-bold uppercase tracking-tighter border border-primary-fixed">
                                                    <span x-text="getTagName(tagId)"></span>
                                                </span>
                                            </template>
                                            <span x-show="!(person.tags || []).length"
                                                  class="font-label-md text-[10px] uppercase italic tracking-widest text-outline/40">No tags</span>
                                        </div>
                                    </div>
                                </td>
                                <td class="px-lg py-4">
                                    <div class="flex flex-col gap-0.5">
                                        <span class="font-label-md text-sm font-semibold"
                                              :class="lastNoteColor(person.id)"
                                              x-text="formatLastNote(person.id)"></span>
                                        <span x-show="lastNoteDates[person.id]" class="text-[10px] text-on-surface-variant/60 uppercase font-bold tracking-tighter">Recorded Date</span>
                                    </div>
                                </td>
                                <td class="px-lg py-4 text-right">
                                    <div class="w-8 h-8 rounded-full bg-surface-container group-hover:bg-primary group-hover:text-white flex items-center justify-center transition-all">
                                        <span class="material-symbols-outlined text-[18px]">chevron_right</span>
                                    </div>
                                </td>
                            </tr>
                        </template>

                        <!-- Empty state -->
                        <tr x-show="filteredPeople.length === 0">
                            <td colspan="4" class="px-lg py-20 text-center text-on-surface-variant space-y-4">
                                <div class="flex flex-col items-center gap-2 opacity-50">
                                    <span class="material-symbols-outlined text-5xl">person_search</span>
                                    <p class="font-body-md italic">No members found matching your search.</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- Add Person Modal -->
    <template x-if="showAddPersonModal">
        <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
            <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" @click="showAddPersonModal = false"></div>
            <div class="bg-surface-container-lowest border border-outline-variant rounded-2xl shadow-2xl w-full max-w-md overflow-hidden relative flex flex-col max-h-[90vh]">
                <header class="px-6 py-4 border-b border-outline-variant flex items-center justify-between bg-surface-container-low">
                    <h3 class="font-headline text-lg text-primary font-bold">Add New Person</h3>
                    <button @click="showAddPersonModal = false" class="text-on-surface-variant hover:text-error transition-colors">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </header>
                <div class="p-6 overflow-y-auto custom-scrollbar space-y-4">
                    <div class="flex flex-col gap-xs">
                        <label class="font-label-md text-[10px] uppercase tracking-widest text-on-surface-variant">Full Name</label>
                        <input type="text" x-model="newPerson.name" placeholder="Required" class="w-full py-2.5 px-4 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-1 focus:ring-primary outline-none text-sm">
                    </div>
                    <div class="flex flex-col gap-xs">
                        <label class="font-label-md text-[10px] uppercase tracking-widest text-on-surface-variant">Email</label>
                        <input type="email" x-model="newPerson.email" class="w-full py-2.5 px-4 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-1 focus:ring-primary outline-none text-sm">
                    </div>
                    <div class="flex flex-col gap-xs">
                        <label class="font-label-md text-[10px] uppercase tracking-widest text-on-surface-variant">Phone</label>
                        <input type="tel" x-model="newPerson.phone" class="w-full py-2.5 px-4 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-1 focus:ring-primary outline-none text-sm">
                    </div>
                    <div class="flex flex-col gap-xs">
                        <label class="font-label-md text-[10px] uppercase tracking-widest text-on-surface-variant">Address</label>
                        <textarea x-model="newPerson.address" rows="2" class="w-full py-2.5 px-4 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-1 focus:ring-primary outline-none text-sm"></textarea>
                    </div>
                    <div class="flex flex-col gap-xs">
                        <label class="font-label-md text-[10px] uppercase tracking-widest text-on-surface-variant">Birthday</label>
                        <input type="date" x-model="newPerson.birthday" class="w-full py-2.5 px-4 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-1 focus:ring-primary outline-none text-sm">
                    </div>
                    <div class="flex flex-col gap-xs">
                        <label class="font-label-md text-[10px] uppercase tracking-widest text-on-surface-variant">Sex</label>
                        <select x-model="newPerson.sex" class="w-full py-2.5 px-4 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-1 focus:ring-primary outline-none text-sm">
                            <option value="">Unknown</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                </div>
                <footer class="p-4 border-t border-outline-variant bg-surface-container-low flex justify-end gap-3">
                    <button @click="showAddPersonModal = false" class="px-4 py-2 text-sm font-label-md text-on-surface-variant hover:bg-surface-container transition-all">Cancel</button>
                    <button @click="addPerson()" :disabled="isSubmitting || !newPerson.name.trim()" class="px-6 py-2 bg-primary text-on-primary rounded-full text-sm font-label-md hover:bg-primary/90 transition-all shadow-sm flex items-center gap-2">
                        <span x-show="isSubmitting" class="material-symbols-outlined text-sm animate-spin">progress_activity</span>
                        <span x-text="isSubmitting ? 'Adding...' : 'Add Person'"></span>
                    </button>
                </footer>
            </div>
        </div>
    </template>

    <!-- Manage Tags Modal (Individual Person) -->
    <template x-if="showTagManagementModal">
        <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
            <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" @click="showTagManagementModal = false"></div>
            <div class="bg-surface-container-lowest border border-outline-variant rounded-2xl shadow-2xl w-full max-w-md overflow-hidden relative flex flex-col max-h-[90vh]">
                <header class="px-6 py-4 border-b border-outline-variant flex items-center justify-between bg-surface-container-low">
                    <div class="flex flex-col">
                        <h3 class="font-headline text-lg text-primary font-bold">Manage Tags</h3>
                        <p class="text-xs text-on-surface-variant" x-text="tagPerson?.name"></p>
                    </div>
                    <button @click="showTagManagementModal = false" class="text-on-surface-variant hover:text-error transition-colors">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </header>
                <div class="p-6 overflow-y-auto custom-scrollbar">
                    <div class="flex flex-wrap gap-2">
                        <template x-for="tag in shepherdingTags" :key="tag.id">
                            <button @click="togglePersonTag(tag.id)"
                                :class="tagPerson.tags.includes(tag.id)
                                    ? 'bg-primary text-on-primary ring-2 ring-primary-fixed'
                                    : 'bg-surface-container text-on-surface hover:bg-surface-container-high border border-outline-variant/30'"
                                class="px-4 py-2 rounded-full font-label-md text-xs transition-all duration-200 flex items-center gap-2">
                                <span class="material-symbols-outlined text-[14px]" x-text="tagPerson.tags.includes(tag.id) ? 'check_circle' : 'add_circle'"></span>
                                <span x-text="tag.name"></span>
                            </button>
                        </template>
                        <div x-show="shepherdingTags.length === 0" class="py-8 text-center w-full opacity-50">
                            <p class="italic text-sm">No tags defined in the system.</p>
                            <a href="shepherding-dashboard.html" class="text-primary font-bold text-xs hover:underline mt-2 inline-block">Go to Dashboard to create tags</a>
                        </div>
                    </div>
                </div>
                <footer class="p-4 border-t border-outline-variant bg-surface-container-low flex justify-end">
                    <button @click="showTagManagementModal = false" class="px-6 py-2 bg-primary text-on-primary rounded-full text-sm font-label-md hover:bg-primary/90 transition-all shadow-sm">Done</button>
                </footer>
            </div>
        </div>
    </template>

    <!-- Toast -->
    <div x-show="toast.show" x-cloak x-transition
         class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-lg py-sm rounded-lg shadow-lg font-label-md text-label-md"
         :class="toast.type === 'error' ? 'bg-error text-on-error' : 'bg-inverse-surface text-inverse-on-surface'">
        <span x-text="toast.message"></span>
    </div>

    <script src="shepherding-people.js"></script>
</body>
</html>
