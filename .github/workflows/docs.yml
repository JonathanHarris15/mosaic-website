name: Build and Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'functions/**'
      - 'public/**'
      - 'scripts/**'
      - '.github/workflows/docs.yml'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node.js dependencies
        run: npm install

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install -r docs/requirements.txt

      - name: Build Sphinx Documentation
        run: |
          cd docs
          # Build markdown first to ensure directives are expanded for llms-full.txt
          sphinx-build -M markdown . _build
          # Then build HTML which will include the rendered content and source code in llms-full.txt
          sphinx-build -M html . _build

      - name: Copy LLM files to root
        run: |
          cp docs/_build/html/llms.txt .
          cp docs/_build/html/llms-full.txt .

      - name: Commit LLM files if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add llms.txt llms-full.txt
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "docs: update llms.txt and llms-full.txt"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/_build/html
